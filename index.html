<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blob It</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#e8e8e2;font-family:'Inter',system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;}

/* ── SIDEBAR (desktop) ── */
#sidebar{
  width:240px;flex-shrink:0;background:#fff;border-right:1px solid #e8e8e2;
  display:flex;flex-direction:column;overflow:hidden;z-index:10;
}
#sidebar-header{
  padding:14px 16px 10px;border-bottom:1px solid #f0f0ea;
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
#sidebar-header h1{font-size:15px;font-weight:700;color:#1a1a1a;flex:1;}
#sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px 24px;}
.section{margin-bottom:20px;}
.section h3{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#bbb;margin-bottom:10px;font-weight:600;}
.param-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px;}
.param-row label{font-size:12px;color:#555;}
.param-row span{font-size:11px;color:#aaa;min-width:28px;text-align:right;}
input[type=range]{width:100%;accent-color:#1a1a1a;margin-bottom:6px;height:18px;}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.color-row label{font-size:12px;color:#555;flex:1;}
.color-row input[type=color]{width:28px;height:24px;border:1px solid #e0e0d8;border-radius:4px;padding:1px;cursor:pointer;background:none;}
.color-row input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
.color-row input[type=color]::-webkit-color-swatch{border:none;border-radius:3px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.toggle-row label{font-size:12px;color:#555;}
.toggle{position:relative;width:32px;height:18px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:9px;cursor:pointer;transition:.2s;}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.2s;}
.toggle input:checked+.toggle-slider{background:#1a1a1a;}
.toggle input:checked+.toggle-slider:before{transform:translateX(14px);}
.divider{height:1px;background:#f0f0ea;margin:0 -16px 16px;}
.hint{font-size:10px;color:#aaa;margin-top:2px;line-height:1.4;}
.action-btn{width:100%;padding:9px;border-radius:8px;border:1px solid #e8e8e2;background:#f8f8f4;color:#444;cursor:pointer;font-size:12px;font-weight:500;margin-bottom:6px;}
.action-btn.primary{background:#1a1a1a;border-color:#1a1a1a;color:#fff;}
.upload-area{border:1.5px dashed #ccc;border-radius:8px;padding:10px;text-align:center;cursor:pointer;font-size:11px;color:#aaa;margin-bottom:8px;}
#img-preview{width:100%;border-radius:6px;display:none;margin-bottom:8px;}

/* swatches in sidebar */
.swatch-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;outline:2px solid transparent;outline-offset:2px;flex-shrink:0;}
.swatch.active{outline-color:#1a1a1a;}

/* ── MAIN AREA ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{
  height:44px;flex-shrink:0;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);
  border-bottom:1px solid #e8e8e2;display:flex;align-items:center;padding:0 12px;gap:6px;
}
.tool-btn{background:transparent;border:1px solid transparent;color:#888;padding:5px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;}
.tool-btn.active{background:#1a1a1a;color:#fff;}
#canvas-area{flex:1;position:relative;overflow:hidden;cursor:crosshair;}
#main-canvas{display:block;width:100%;height:100%;touch-action:none;}

/* ── MOBILE overrides (<768px) ── */
@media(max-width:767px){
  body{flex-direction:column;}
  #sidebar{display:none;}
  #main{flex:1;}
  #topbar{display:none;}
  /* mobile toolbar */
  #mobile-toolbar{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    display:flex;gap:4px;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);
    border:1px solid #e0e0d8;border-radius:10px;padding:4px;z-index:30;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  #quick-bar{
    position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e2;
    padding:8px 14px;display:flex;align-items:center;gap:9px;z-index:40;height:52px;
  }
  #quick-bar input[type=color]{width:26px;height:26px;border:1px solid #e0e0d8;border-radius:50%;padding:1px;cursor:pointer;background:none;flex-shrink:0;}
  #quick-bar input[type=color]::-webkit-color-swatch-wrapper{padding:0;border-radius:50%;}
  #quick-bar input[type=color]::-webkit-color-swatch{border:none;border-radius:50%;}
  #panel-toggle{margin-left:auto;background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;padding:2px 8px;line-height:1;flex-shrink:0;}
  #drawer{
    position:fixed;left:0;right:0;bottom:52px;background:#fff;border-top:1px solid #e8e8e2;
    z-index:35;max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);
  }
  #drawer.open{max-height:60dvh;}
  #drawer-inner{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;max-height:60dvh;padding:14px 16px 20px;display:flex;flex-direction:column;gap:16px;}
}
@media(min-width:768px){
  #mobile-toolbar,#quick-bar,#drawer{display:none!important;}
}

/* artboard modal */
#ab-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center;}
#ab-modal.show{display:flex;}
#ab-box{background:#fff;border-radius:14px;padding:24px;width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.18);}
#ab-box h2{font-size:14px;font-weight:600;margin-bottom:16px;}
#ab-box label{font-size:12px;color:#555;display:block;margin-bottom:4px;}
#ab-box input[type=number]{width:100%;border:1px solid #e0e0d8;border-radius:6px;padding:7px 10px;font-size:13px;margin-bottom:12px;}
.ab-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ab-preset{padding:5px 10px;border-radius:6px;border:1px solid #e0e0d8;background:#f8f8f4;font-size:11px;cursor:pointer;color:#555;}
.ab-preset:hover{background:#eee;}
.ab-row{display:flex;gap:8px;}
.ab-btn{flex:1;padding:9px;border-radius:8px;border:1px solid #e8e8e2;background:#f8f8f4;color:#444;cursor:pointer;font-size:12px;font-weight:500;}
.ab-btn.primary{background:#1a1a1a;border-color:#1a1a1a;color:#fff;}
</style>
</head>
<body>

<!-- ── DESKTOP SIDEBAR ── -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Blob It</h1>
  </div>
  <div id="sidebar-scroll">

    <div class="section">
      <h3>Color</h3>
      <div class="swatch-row" id="sb-swatches">
        <div class="swatch active" style="background:#ff6b9d" data-color="#ff6b9d"></div>
        <div class="swatch" style="background:#667eea" data-color="#667eea"></div>
        <div class="swatch" style="background:#43e97b" data-color="#43e97b"></div>
        <div class="swatch" style="background:#a18cd1" data-color="#a18cd1"></div>
        <div class="swatch" style="background:#fcb69f" data-color="#fcb69f"></div>
        <div class="swatch" style="background:#1a1a1a" data-color="#1a1a1a"></div>
        <div class="swatch" style="background:#fff;border:1px solid #ddd" data-color="#ffffff"></div>
      </div>
      <div class="color-row"><label>Fill</label><input type="color" id="fill-color" value="#ff6b9d"></div>
      <div class="color-row"><label>Stroke</label><input type="color" id="stroke-color" value="#1a1a1a"></div>
    </div>

    <div class="divider"></div>
    <div class="section">
      <h3>Blob</h3>
      <div class="param-row"><label>Radius</label><span id="val-radius">36</span></div>
      <input type="range" id="sl-radius" min="10" max="80" value="36">
      <div class="param-row"><label>Smooth</label><span id="val-smooth">60</span></div>
      <input type="range" id="sl-smooth" min="10" max="100" value="60">
      <div class="param-row"><label>Loose</label><span id="val-loose">40</span></div>
      <input type="range" id="sl-loose" min="0" max="100" value="40">
      <div class="param-row"><label>Noise</label><span id="val-noise">30</span></div>
      <input type="range" id="sl-noise" min="0" max="100" value="30">
      <div class="param-row"><label>Opacity</label><span id="val-opacity">90</span></div>
      <input type="range" id="sl-opacity" min="0" max="100" value="90">
    </div>

    <div class="divider"></div>
    <div class="section">
      <h3>Stroke</h3>
      <div class="toggle-row">
        <label>Enable</label>
        <label class="toggle"><input type="checkbox" id="ck-stroke"><span class="toggle-slider"></span></label>
      </div>
      <div class="param-row"><label>Width</label><span id="val-swidth">3</span></div>
      <input type="range" id="sl-swidth" min="1" max="20" value="3">
      <div class="param-row"><label>Opacity</label><span id="val-sopacity">100</span></div>
      <input type="range" id="sl-sopacity" min="10" max="100" value="100">
    </div>

    <div class="divider"></div>
    <div class="section">
      <h3>Warp</h3>
      <div class="param-row"><label>Radius</label><span id="val-wradius">80</span></div>
      <input type="range" id="sl-wradius" min="20" max="300" value="80">
      <div class="param-row"><label>Strength</label><span id="val-wstrength">60</span></div>
      <input type="range" id="sl-wstrength" min="1" max="100" value="60">
      <p class="hint">Warp mode · click to place · right-click to remove</p>
    </div>

    <div class="divider"></div>
    <div class="section">
      <h3>Branch</h3>
      <div class="toggle-row">
        <label>Hold to grow</label>
        <label class="toggle"><input type="checkbox" id="ck-branch" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="param-row"><label>Density</label><span id="val-bdensity">40</span></div>
      <input type="range" id="sl-bdensity" min="5" max="100" value="40">
      <div class="param-row"><label>Length</label><span id="val-blength">50</span></div>
      <input type="range" id="sl-blength" min="10" max="100" value="50">
    </div>

    <div class="divider"></div>
    <div class="section">
      <h3>Image → Blob</h3>
      <div class="upload-area" id="upload-area">Click or drop image</div>
      <input type="file" id="file-input" accept="image/*" style="display:none">
      <img id="img-preview">
      <div class="param-row"><label>Low</label><span id="val-elow">15</span></div>
      <input type="range" id="sl-elow" min="1" max="60" value="15">
      <div class="param-row"><label>High</label><span id="val-ehigh">40</span></div>
      <input type="range" id="sl-ehigh" min="5" max="120" value="40">
      <div class="param-row"><label>Blur</label><span id="val-eblur">1</span></div>
      <input type="range" id="sl-eblur" min="0" max="5" step="0.5" value="1">
      <div class="param-row"><label>Min chain</label><span id="val-emin">8</span></div>
      <input type="range" id="sl-emin" min="2" max="40" value="8">
      <button class="action-btn" id="btn-apply-img">Apply to Board</button>
    </div>

    <div class="divider"></div>
    <div class="section">
      <h3>Export</h3>
      <button class="action-btn primary" id="btn-export-png">Export PNG</button>
      <button class="action-btn" id="btn-export-svg">Export SVG</button>
    </div>

  </div>
</div>

<!-- ── MAIN CANVAS AREA ── -->
<div id="main">
  <div id="topbar">
    <button class="tool-btn active" id="btn-draw">Draw</button>
    <button class="tool-btn" id="btn-warp">Warp</button>
    <button class="tool-btn" id="btn-pan">Pan</button>
    <button class="tool-btn" id="btn-new-ab">+ Board</button>
    <button class="tool-btn" id="btn-clear">Clear</button>
    <span style="margin-left:auto;font-size:11px;color:#bbb;" id="zoom-label">100%</span>
  </div>
  <div id="canvas-area">
    <!-- mobile toolbar (hidden on desktop) -->
    <div id="mobile-toolbar">
      <button class="tool-btn active" id="m-btn-draw">Draw</button>
      <button class="tool-btn" id="m-btn-warp">Warp</button>
      <button class="tool-btn" id="m-btn-pan">Pan</button>
      <button class="tool-btn" id="m-btn-new-ab">+</button>
      <button class="tool-btn" id="m-btn-clear">✕</button>
    </div>
    <canvas id="main-canvas"></canvas>
  </div>
</div>

<!-- mobile quick bar -->
<div id="quick-bar">
  <div class="swatch active" style="background:#ff6b9d" data-color="#ff6b9d"></div>
  <div class="swatch" style="background:#667eea" data-color="#667eea"></div>
  <div class="swatch" style="background:#43e97b" data-color="#43e97b"></div>
  <div class="swatch" style="background:#a18cd1" data-color="#a18cd1"></div>
  <div class="swatch" style="background:#1a1a1a" data-color="#1a1a1a"></div>
  <input type="color" id="m-fill-color" value="#ff6b9d">
  <button id="panel-toggle">⋯</button>
</div>

<!-- mobile drawer -->
<div id="drawer">
  <div id="drawer-inner">
    <div class="section">
      <h3>Blob</h3>
      <div class="param-row"><label>Radius</label><span id="m-val-radius">36</span></div>
      <input type="range" id="m-sl-radius" min="10" max="80" value="36">
      <div class="param-row"><label>Smooth</label><span id="m-val-smooth">60</span></div>
      <input type="range" id="m-sl-smooth" min="10" max="100" value="60">
      <div class="param-row"><label>Loose</label><span id="m-val-loose">40</span></div>
      <input type="range" id="m-sl-loose" min="0" max="100" value="40">
      <div class="param-row"><label>Noise</label><span id="m-val-noise">30</span></div>
      <input type="range" id="m-sl-noise" min="0" max="100" value="30">
      <div class="param-row"><label>Opacity</label><span id="m-val-opacity">90</span></div>
      <input type="range" id="m-sl-opacity" min="0" max="100" value="90">
    </div>
    <div class="divider"></div>
    <div class="section">
      <h3>Stroke</h3>
      <div class="toggle-row"><label>Enable</label><label class="toggle"><input type="checkbox" id="m-ck-stroke"><span class="toggle-slider"></span></label></div>
      <div class="param-row"><label>Width</label><span id="m-val-swidth">3</span></div>
      <input type="range" id="m-sl-swidth" min="1" max="20" value="3">
    </div>
    <div class="divider"></div>
    <div class="section">
      <h3>Warp</h3>
      <div class="param-row"><label>Radius</label><span id="m-val-wradius">80</span></div>
      <input type="range" id="m-sl-wradius" min="20" max="300" value="80">
      <div class="param-row"><label>Strength</label><span id="m-val-wstrength">60</span></div>
      <input type="range" id="m-sl-wstrength" min="1" max="100" value="60">
    </div>
    <div class="divider"></div>
    <div class="section">
      <h3>Export</h3>
      <button class="action-btn primary" id="m-btn-export-png">Export PNG</button>
      <button class="action-btn" id="m-btn-export-svg">Export SVG</button>
    </div>
  </div>
</div>

<!-- artboard modal -->
<div id="ab-modal">
  <div id="ab-box">
    <h2>New Artboard</h2>
    <div class="ab-presets">
      <button class="ab-preset" data-w="800" data-h="600">800×600</button>
      <button class="ab-preset" data-w="1080" data-h="1080">1080²</button>
      <button class="ab-preset" data-w="1920" data-h="1080">1920×1080</button>
      <button class="ab-preset" data-w="595" data-h="842">A4</button>
    </div>
    <label>Width</label><input type="number" id="ab-w" value="800" min="100" max="4000">
    <label>Height</label><input type="number" id="ab-h" value="600" min="100" max="4000">
    <div class="ab-row">
      <button class="ab-btn" id="ab-cancel">Cancel</button>
      <button class="ab-btn primary" id="ab-create">Create</button>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('main-canvas');
const ctx=canvas.getContext('2d');
const area=document.getElementById('canvas-area');

// viewport
let vx=0,vy=0,vscale=1;
// artboards
let artboards=[],activeAB=0;
// state
let currentStroke=null,isDrawing=false;
let fillColor='#ff6b9d',strokeColor='#1a1a1a';
let rafId=null,holdTimer=null,holdActive=false,uploadedImage=null;
let drawerOpen=false,currentTool='draw';
let isPanning=false,panStart={x:0,y:0},panOrigin={x:0,y:0};
let pinchDist=0,pinchMid={x:0,y:0},pinchOrigin={x:0,y:0},pinchScaleOrigin=1;

const isMobile=()=>window.innerWidth<768;

// unified param reader — desktop sliders take priority, fall back to mobile
function p(name){
  const d=document.getElementById('sl-'+name);
  const m=document.getElementById('m-sl-'+name);
  const el=d||m;
  return el?parseFloat(el.value):0;
}
function pck(name){
  const d=document.getElementById('ck-'+name);
  const m=document.getElementById('m-ck-'+name);
  return (d||m)?.checked||false;
}

function bindSlider(id,valId){
  const sl=document.getElementById(id),vl=document.getElementById(valId);
  if(!sl||!vl) return;
  sl.addEventListener('input',()=>{vl.textContent=sl.value;scheduleRender();});
}
['radius','smooth','loose','noise','opacity','swidth','sopacity','bdensity','blength',
 'elow','ehigh','eblur','emin','wradius','wstrength'].forEach(n=>{
  bindSlider('sl-'+n,'val-'+n);
  bindSlider('m-sl-'+n,'m-val-'+n);
});
document.getElementById('ck-stroke')?.addEventListener('change',scheduleRender);
document.getElementById('m-ck-stroke')?.addEventListener('change',scheduleRender);

// color sync
function setFillColor(c){
  fillColor=c;
  const d=document.getElementById('fill-color'),m=document.getElementById('m-fill-color');
  if(d) d.value=c; if(m) m.value=c;
  scheduleRender();
}
document.getElementById('fill-color')?.addEventListener('input',e=>setFillColor(e.target.value));
document.getElementById('m-fill-color')?.addEventListener('input',e=>setFillColor(e.target.value));
document.getElementById('stroke-color')?.addEventListener('input',e=>{strokeColor=e.target.value;scheduleRender();});

// swatches (both desktop and mobile)
document.querySelectorAll('.swatch').forEach(sw=>{
  sw.addEventListener('click',()=>{
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    setFillColor(sw.dataset.color);
  });
});

// panel toggle (mobile)
document.getElementById('panel-toggle')?.addEventListener('click',()=>{
  drawerOpen=!drawerOpen;
  document.getElementById('drawer').classList.toggle('open',drawerOpen);
  document.getElementById('panel-toggle').textContent=drawerOpen?'✕':'⋯';
});

// tool switching
function setTool(t){
  currentTool=t;
  ['draw','warp','pan'].forEach(n=>{
    document.getElementById('btn-'+n)?.classList.toggle('active',t===n);
    document.getElementById('m-btn-'+n)?.classList.toggle('active',t===n);
  });
  area.style.cursor=t==='pan'?'grab':'crosshair';
  scheduleRender();
}
['draw','warp','pan'].forEach(n=>{
  document.getElementById('btn-'+n)?.addEventListener('click',()=>setTool(n));
  document.getElementById('m-btn-'+n)?.addEventListener('click',()=>setTool(n));
});

// clear
function doClear(){
  if(activeAB===null||!artboards[activeAB]) return;
  artboards[activeAB].strokes=[];artboards[activeAB].warpPoints=[];scheduleRender();
}
document.getElementById('btn-clear')?.addEventListener('click',doClear);
document.getElementById('m-btn-clear')?.addEventListener('click',doClear);

// artboard modal
function openABModal(){document.getElementById('ab-modal').classList.add('show');}
document.getElementById('btn-new-ab')?.addEventListener('click',openABModal);
document.getElementById('m-btn-new-ab')?.addEventListener('click',openABModal);
document.getElementById('ab-cancel')?.addEventListener('click',()=>document.getElementById('ab-modal').classList.remove('show'));
document.querySelectorAll('.ab-preset').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.getElementById('ab-w').value=btn.dataset.w;
    document.getElementById('ab-h').value=btn.dataset.h;
  });
});
document.getElementById('ab-create')?.addEventListener('click',()=>{
  const w=parseInt(document.getElementById('ab-w').value)||800;
  const h=parseInt(document.getElementById('ab-h').value)||600;
  const last=artboards[artboards.length-1];
  const nx=last?last.x+last.w+80:-w/2,ny=last?last.y:-h/2;
  artboards.push({x:nx,y:ny,w,h,strokes:[],warpPoints:[]});
  activeAB=artboards.length-1;
  panToAB(activeAB);
  document.getElementById('ab-modal').classList.remove('show');
  scheduleRender();
});

function panToAB(idx){
  const ab=artboards[idx];
  vx=canvas.width/2-(ab.x+ab.w/2)*vscale;
  vy=canvas.height/2-(ab.y+ab.h/2)*vscale;
}

// resize
function resize(){
  canvas.width=area.clientWidth;canvas.height=area.clientHeight;
  scheduleRender();
}
window.addEventListener('resize',resize);

// coord helpers
function screenToWorld(sx,sy){return{x:(sx-vx)/vscale,y:(sy-vy)/vscale};}
function getScreenPos(e){
  const r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
}
function getWorldPos(e){const s=getScreenPos(e);return screenToWorld(s.x,s.y);}
function hitArtboard(wx,wy){
  for(let i=artboards.length-1;i>=0;i--){
    const ab=artboards[i];
    if(wx>=ab.x&&wx<=ab.x+ab.w&&wy>=ab.y&&wy<=ab.y+ab.h) return i;
  }
  return -1;
}

function onStart(e){
  if(e.target!==canvas) return; e.preventDefault();
  if(e.touches&&e.touches.length===2){
    const r=canvas.getBoundingClientRect();
    const ax=(e.touches[0].clientX-r.left)*(canvas.width/r.width),ay=(e.touches[0].clientY-r.top)*(canvas.height/r.height);
    const bx=(e.touches[1].clientX-r.left)*(canvas.width/r.width),by=(e.touches[1].clientY-r.top)*(canvas.height/r.height);
    pinchDist=Math.sqrt((bx-ax)**2+(by-ay)**2);
    pinchMid={x:(ax+bx)/2,y:(ay+by)/2};
    pinchOrigin={x:vx,y:vy};pinchScaleOrigin=vscale;
    isPanning=false;isDrawing=false;return;
  }
  const sp=getScreenPos(e);
  if(currentTool==='pan'){isPanning=true;panStart=sp;panOrigin={x:vx,y:vy};area.style.cursor='grabbing';return;}
  const wp=screenToWorld(sp.x,sp.y);
  const abIdx=hitArtboard(wp.x,wp.y);
  if(abIdx>=0) activeAB=abIdx;
  if(activeAB===null||!artboards[activeAB]) return;
  const ab=artboards[activeAB];
  const lx=wp.x-ab.x,ly=wp.y-ab.y;
  if(currentTool==='warp'){
    ab.warpPoints.push({x:lx,y:ly,r:p('wradius'),strength:p('wstrength')/100});
    scheduleRender();return;
  }
  isDrawing=true;holdActive=false;currentStroke=[{x:lx,y:ly}];
  if(pck('branch')) holdTimer=setTimeout(()=>{holdActive=true;growBranches();},500);
}
function onMove(e){
  e.preventDefault();
  if(e.touches&&e.touches.length===2){
    const r=canvas.getBoundingClientRect();
    const ax=(e.touches[0].clientX-r.left)*(canvas.width/r.width),ay=(e.touches[0].clientY-r.top)*(canvas.height/r.height);
    const bx=(e.touches[1].clientX-r.left)*(canvas.width/r.width),by=(e.touches[1].clientY-r.top)*(canvas.height/r.height);
    const dist=Math.sqrt((bx-ax)**2+(by-ay)**2);
    const mid={x:(ax+bx)/2,y:(ay+by)/2};
    const newScale=Math.max(0.05,Math.min(10,pinchScaleOrigin*dist/pinchDist));
    vx=mid.x+(pinchOrigin.x-pinchMid.x)*newScale/pinchScaleOrigin;
    vy=mid.y+(pinchOrigin.y-pinchMid.y)*newScale/pinchScaleOrigin;
    vscale=newScale;updateZoomLabel();scheduleRender();return;
  }
  if(isPanning){const sp=getScreenPos(e);vx=panOrigin.x+(sp.x-panStart.x);vy=panOrigin.y+(sp.y-panStart.y);scheduleRender();return;}
  if(!isDrawing||currentTool!=='draw'||activeAB===null) return;
  const wp=getWorldPos(e);const ab=artboards[activeAB];
  const lx=wp.x-ab.x,ly=wp.y-ab.y;
  const last=currentStroke[currentStroke.length-1];
  if((lx-last.x)**2+(ly-last.y)**2>4/vscale/vscale){currentStroke.push({x:lx,y:ly});scheduleRender(true);}
}
function onEnd(){
  if(isPanning){isPanning=false;area.style.cursor=currentTool==='pan'?'grab':'crosshair';}

  isDrawing=false;currentStroke=null;scheduleRender();
}

}

function growBranches(){

  const ab=artboards[activeAB];
  const radius=p('radius'),density=p('bdensity')/100,lf=p('blength')/100;
  const src=currentStroke,num=Math.max(1,Math.floor(src.length*density*0.25));
  for(let b=0;b<num;b++){
    const idx=Math.floor(Math.random()*(src.length-1)),pt=src[idx];
    const nx=src[Math.min(idx+1,src.length-1)],px2=src[Math.max(idx-1,0)];
    const dx=nx.x-px2.x,dy=nx.y-px2.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    const perpX=-dy/len,perpY=dx/len,angle=(Math.random()-0.5)*Math.PI*0.9;
    const cos=Math.cos(angle),sin=Math.sin(angle);
    const bx=perpX*cos-perpY*sin,by=perpX*sin+perpY*cos;
    const bl=radius*(1.5+Math.random()*2.5)*lf,steps=Math.max(3,Math.floor(bl/5));
    const branch=[pt];
    for(let s=1;s<=steps;s++){const t=s/steps;branch.push({x:pt.x+bx*bl*t+(Math.random()-0.5)*radius*0.25,y:pt.y+by*bl*t+(Math.random()-0.5)*radius*0.25});}
    ab.strokes.push(branch);
  }

}

function gaussianBlur(gray,w,h,sigma){
  if(sigma<=0) return gray;
  const r=Math.ceil(sigma*2),size=2*r+1,k=new Float32Array(size);
  let sum=0;
  for(let i=0;i<size;i++){k[i]=Math.exp(-((i-r)**2)/(2*sigma*sigma));sum+=k[i];}
  for(let i=0;i<size;i++) k[i]/=sum;
  const tmp=new Float32Array(w*h),out=new Float32Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    let v=0;for(let i=0;i<size;i++){const xi=Math.max(0,Math.min(w-1,x+i-r));v+=gray[y*w+xi]*k[i];}tmp[y*w+x]=v;
  }
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    let v=0;for(let i=0;i<size;i++){const yi=Math.max(0,Math.min(h-1,y+i-r));v+=tmp[yi*w+x]*k[i];}out[y*w+x]=v;
  }
  return out;
}
function cannyEdge(imgData,lowT,highT,sigma){
  const w=imgData.width,h=imgData.height,d=imgData.data;
  const gray=new Float32Array(w*h);
  for(let i=0;i<w*h;i++) gray[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];
  const bl=gaussianBlur(gray,w,h,sigma);
  const mag=new Float32Array(w*h),ang=new Float32Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const gx=-bl[(y-1)*w+(x-1)]-2*bl[y*w+(x-1)]-bl[(y+1)*w+(x-1)]+bl[(y-1)*w+(x+1)]+2*bl[y*w+(x+1)]+bl[(y+1)*w+(x+1)];
    const gy=-bl[(y-1)*w+(x-1)]-2*bl[(y-1)*w+x]-bl[(y-1)*w+(x+1)]+bl[(y+1)*w+(x-1)]+2*bl[(y+1)*w+x]+bl[(y+1)*w+(x+1)];
    mag[y*w+x]=Math.sqrt(gx*gx+gy*gy);ang[y*w+x]=Math.atan2(gy,gx);
  }
  const nms=new Float32Array(w*h);
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const m=mag[y*w+x],deg=((ang[y*w+x]*180/Math.PI)%180+180)%180;
    let n1,n2;
    if(deg<22.5||deg>=157.5){n1=mag[y*w+(x-1)];n2=mag[y*w+(x+1)];}
    else if(deg<67.5){n1=mag[(y-1)*w+(x+1)];n2=mag[(y+1)*w+(x-1)];}
    else if(deg<112.5){n1=mag[(y-1)*w+x];n2=mag[(y+1)*w+x];}
    else{n1=mag[(y-1)*w+(x-1)];n2=mag[(y+1)*w+(x+1)];}
    nms[y*w+x]=(m>=n1&&m>=n2)?m:0;
  }
  const STRONG=2,WEAK=1,edge=new Uint8Array(w*h);
  for(let i=0;i<w*h;i++){if(nms[i]>=highT)edge[i]=STRONG;else if(nms[i]>=lowT)edge[i]=WEAK;}
  const queue=[];
  for(let i=0;i<w*h;i++) if(edge[i]===STRONG) queue.push(i);
  const dx8=[-1,0,1,-1,1,-1,0,1],dy8=[-1,-1,-1,0,0,1,1,1];
  let qi=0;
  while(qi<queue.length){
    const idx=queue[qi++],y=Math.floor(idx/w),x=idx%w;
    for(let d=0;d<8;d++){
      const nx=x+dx8[d],ny=y+dy8[d];
      if(nx<0||nx>=w||ny<0||ny>=h) continue;
      const ni=ny*w+nx;if(edge[ni]===WEAK){edge[ni]=STRONG;queue.push(ni);}
    }
  }
  for(let i=0;i<w*h;i++) if(edge[i]===WEAK) edge[i]=0;
  return edge;
}
function traceChains(edge,w,h,minLen){
  const visited=new Uint8Array(w*h),chains=[];
  const dx8=[-1,0,1,-1,1,-1,0,1],dy8=[-1,-1,-1,0,0,1,1,1];
  for(let sy=1;sy<h-1;sy++) for(let sx=1;sx<w-1;sx++){
    const si=sy*w+sx;if(!edge[si]||visited[si]) continue;
    visited[si]=1;const ch=[{x:sx,y:sy}];let cx=sx,cy=sy,extended=true;
    while(extended){
      extended=false;
      for(let d=0;d<8;d++){
        const nx=cx+dx8[d],ny=cy+dy8[d];
        if(nx<0||nx>=w||ny<0||ny>=h) continue;
        const ni=ny*w+nx;
        if(edge[ni]&&!visited[ni]){visited[ni]=1;ch.push({x:nx,y:ny});cx=nx;cy=ny;extended=true;break;}
      }
    }
    if(ch.length>=minLen) chains.push(ch);
  }
  return chains;
}
function applyImageEdge(){
  if(!uploadedImage||activeAB===null) return;
  const ab=artboards[activeAB];
  const oc=document.createElement('canvas');
  const scale=Math.min(ab.w/uploadedImage.width,ab.h/uploadedImage.height);
  oc.width=Math.floor(uploadedImage.width*scale);oc.height=Math.floor(uploadedImage.height*scale);
  const oc2=oc.getContext('2d');oc2.drawImage(uploadedImage,0,0,oc.width,oc.height);
  const id=oc2.getImageData(0,0,oc.width,oc.height);
  const edgeMap=cannyEdge(id,p('elow'),p('ehigh'),p('eblur'));
  const chains=traceChains(edgeMap,oc.width,oc.height,p('emin'));
  const ox=(ab.w-oc.width)/2,oy=(ab.h-oc.height)/2;
  ab.strokes=chains.map(c=>c.map(pt=>({x:pt.x+ox,y:pt.y+oy})));
  scheduleRender();
}
function snoise(x,y){
  const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const h=(a,b)=>((Math.sin(a*127.1+b*311.7)*43758.5453)%1+1)%1;
  const lerp=(a,b,t)=>a+t*(b-a),fade=t=>t*t*(3-2*t);
  return lerp(lerp(h(xi,yi),h(xi+1,yi),fade(xf)),lerp(h(xi,yi+1),h(xi+1,yi+1),fade(xf)),fade(yf))*2-1;
}
function resample(pts,spacing){
  if(pts.length<2) return pts;
  const out=[pts[0]];let carry=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y,seg=Math.sqrt(dx*dx+dy*dy);
    let d=carry;
    while(d<seg){const t=d/seg;out.push({x:pts[i-1].x+dx*t,y:pts[i-1].y+dy*t});d+=spacing;}
    carry=d-seg;
  }
  return out;
}
function buildField(pts,r,cols,rows,step){
  const cutoff2=4*r*r,grid=new Float32Array(cols*rows);
  for(let i=0;i<pts.length;i++){
    const px=pts[i].x,py=pts[i].y;
    const c0=Math.max(0,Math.floor((px-2*r)/step)),c1=Math.min(cols-1,Math.ceil((px+2*r)/step));
    const r0=Math.max(0,Math.floor((py-2*r)/step)),r1=Math.min(rows-1,Math.ceil((py+2*r)/step));
    for(let row=r0;row<=r1;row++) for(let col=c0;col<=c1;col++){
      const dx=col*step-px,dy=row*step-py,d2=dx*dx+dy*dy;
      if(d2<cutoff2) grid[row*cols+col]+=(1-d2/cutoff2)**2;
    }
  }
  return grid;
}
function applyWarpToField(grid,cols,rows,step,wpts,thresh){
  for(const wp of wpts){
    const wr=wp.r,s=wp.strength,cutoff2=wr*wr;
    const c0=Math.max(0,Math.floor((wp.x-wr)/step)),c1=Math.min(cols-1,Math.ceil((wp.x+wr)/step));
    const r0=Math.max(0,Math.floor((wp.y-wr)/step)),r1=Math.min(rows-1,Math.ceil((wp.y+wr)/step));
    for(let row=r0;row<=r1;row++) for(let col=c0;col<=c1;col++){
      const dx=col*step-wp.x,dy=row*step-wp.y,d2=dx*dx+dy*dy;
      if(d2>=cutoff2) continue;
      grid[row*cols+col]+=(1-d2/cutoff2)**2*s*thresh*2.5;
    }
  }
}
function warpedSample(grid,cols,rows,col,row,nd,nf){
  if(nd<=0){const c=Math.max(0,Math.min(cols-1,col)),r=Math.max(0,Math.min(rows-1,row));return grid[r*cols+c];}
  const wc=col+snoise(col*nf,row*nf)*nd,wr=row+snoise(col*nf+31.41,row*nf+27.18)*nd;
  const c0=Math.floor(wc),r0=Math.floor(wr),c1=Math.min(cols-1,c0+1),r1=Math.min(rows-1,r0+1);
  const fc=wc-c0,fr=wr-r0;
  const cc0=Math.max(0,Math.min(cols-1,c0)),cc1=Math.max(0,Math.min(cols-1,c1));
  const rr0=Math.max(0,Math.min(rows-1,r0)),rr1=Math.max(0,Math.min(rows-1,r1));
  return(grid[rr0*cols+cc0]*(1-fc)+grid[rr0*cols+cc1]*fc)*(1-fr)
        +(grid[rr1*cols+cc0]*(1-fc)+grid[rr1*cols+cc1]*fc)*fr;
}
function march(grid,cols,rows,step,thresh,nd,nf){
  const segs=[],sv=(c,r)=>warpedSample(grid,cols,rows,c,r,nd,nf);
  const interp=(ax,ay,bx,by,va,vb)=>{const t=(thresh-va)/(vb-va);return{x:ax+(bx-ax)*t,y:ay+(by-ay)*t};};
  for(let r=0;r<rows-1;r++) for(let c=0;c<cols-1;c++){
    const x=c*step,y=r*step,x1=x+step,y1=y+step;
    const v00=sv(c,r),v10=sv(c+1,r),v01=sv(c,r+1),v11=sv(c+1,r+1);
    const idx=(v00>thresh?8:0)|(v10>thresh?4:0)|(v11>thresh?2:0)|(v01>thresh?1:0);
    if(idx===0||idx===15) continue;
    const T=interp(x,y,x1,y,v00,v10),R=interp(x1,y,x1,y1,v10,v11);
    const B=interp(x,y1,x1,y1,v01,v11),L=interp(x,y,x,y1,v00,v01);
    if(idx===5||idx===10){
      const center=(v00+v10+v01+v11)*0.25;
      if(idx===5){if(center>thresh){segs.push([T,R],[B,L]);}else{segs.push([T,L],[R,B]);}}
      else{if(center>thresh){segs.push([T,L],[R,B]);}else{segs.push([T,R],[B,L]);}}
      continue;
    }
    const tbl={1:[[B,L]],2:[[R,B]],3:[[R,L]],4:[[T,R]],6:[[T,B]],7:[[T,L]],
               8:[[L,T]],9:[[T,B]],11:[[R,T]],12:[[R,L]],13:[[B,R]],14:[[L,B]]};
    (tbl[idx]||[]).forEach(([a,b])=>segs.push([a,b]));
  }
  return segs;
}
function chainSegs(segs){
  if(!segs.length) return [];
  const EPS=1.0,adj=new Map();
  function key(pt){return `${Math.round(pt.x/EPS)},${Math.round(pt.y/EPS)}`;}
  function addAdj(k,i){if(!adj.has(k))adj.set(k,[]);adj.get(k).push(i);}
  for(let i=0;i<segs.length;i++){addAdj(key(segs[i][0]),i);addAdj(key(segs[i][1]),i);}
  const used=new Uint8Array(segs.length),chains=[];
  for(let i=0;i<segs.length;i++){
    if(used[i]) continue; used[i]=1;
    const pts=[segs[i][0],segs[i][1]];
    for(let dir=0;dir<2;dir++){
      let changed=true;
      while(changed){
        changed=false;
        const tip=dir===0?pts[pts.length-1]:pts[0];
        for(const j of(adj.get(key(tip))||[])){
          if(used[j]) continue; used[j]=1; changed=true;
          const[a,b]=segs[j];
          if(dir===0) pts.push(key(tip)===key(a)?b:a);
          else pts.unshift(key(tip)===key(a)?b:a);
          break;
        }
      }
    }
    if(pts.length>2) chains.push(pts);
  }
  return chains;
}

function getABChains(ab,live){
  const all=live&&currentStroke?[...ab.strokes,currentStroke]:ab.strokes;
  if(!all.length&&!ab.warpPoints.length) return null;
  const radius=p('radius'),smoothness=p('smooth')/100,loose=p('loose')/100,noiseAmt=p('noise')/100;
  const step=Math.max(3,Math.floor(radius/7));
  const cols=Math.ceil(ab.w/step)+2,rows=Math.ceil(ab.h/step)+2;
  const allPts=[];
  if(all.length) all.forEach(s=>resample(s,Math.max(2,radius*0.35)).forEach(pt=>allPts.push(pt)));
  const grid=buildField(allPts,radius,cols,rows,step);
  let maxVal=0;
  for(let i=0;i<grid.length;i++) if(grid[i]>maxVal) maxVal=grid[i];
  if(maxVal<0.01&&ab.warpPoints.length) maxVal=1.0;
  if(maxVal<0.01) return null;
  const thresh=maxVal*(0.18+loose*0.37)*(0.5+(1-smoothness)*0.5);
  if(ab.warpPoints.length) applyWarpToField(grid,cols,rows,step,ab.warpPoints,thresh);
  return chainSegs(march(grid,cols,rows,step,thresh,noiseAmt*4.5,0.18+noiseAmt*0.25));
}

function smoothPathCtx(c2d,pts){
  if(pts.length<2) return;
  c2d.moveTo(pts[0].x,pts[0].y);
  for(let i=0;i<pts.length-1;i++){
    const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;
    if(i===0) c2d.lineTo(mx,my); else c2d.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
  }
  c2d.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
}
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}

function drawArtboard(ab,idx,live){
  const sx=ab.x*vscale+vx,sy=ab.y*vscale+vy,sw=ab.w*vscale,sh=ab.h*vscale;
  // shadow + white bg
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.13)';ctx.shadowBlur=20;ctx.shadowOffsetY=4;
  ctx.fillStyle='#fff';ctx.fillRect(sx,sy,sw,sh);
  ctx.restore();
  // active outline
  if(idx===activeAB){
    ctx.save();ctx.strokeStyle='#4a90e2';ctx.lineWidth=2;ctx.strokeRect(sx-1,sy-1,sw+2,sh+2);ctx.restore();
  }
  // blobs clipped to artboard
  const chains=getABChains(ab,live&&idx===activeAB);
  if(chains&&chains.length){
    const fo=p('opacity')/100,strokeOn=pck('stroke');
    const sw2=p('swidth'),so=p('sopacity')/100;
    const{r,g,b}=hexToRgb(fillColor),{r:sr,g:sg,b:sb}=hexToRgb(strokeColor);
    ctx.save();
    ctx.beginPath();ctx.rect(sx,sy,sw,sh);ctx.clip();
    ctx.save();ctx.translate(sx,sy);ctx.scale(vscale,vscale);
    ctx.beginPath();
    chains.forEach(c=>{smoothPathCtx(ctx,c);ctx.closePath();});
    if(fo>0){ctx.fillStyle=`rgba(${r},${g},${b},${fo})`;ctx.fill('evenodd');}
    if(strokeOn){ctx.strokeStyle=`rgba(${sr},${sg},${sb},${so})`;ctx.lineWidth=sw2;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();}
    ctx.restore();
    // warp indicators
    if(ab.warpPoints.length){
      ctx.save();ctx.translate(sx,sy);ctx.scale(vscale,vscale);
      ab.warpPoints.forEach(wp=>{
        ctx.beginPath();ctx.arc(wp.x,wp.y,wp.r,0,Math.PI*2);
        ctx.strokeStyle=currentTool==='warp'&&idx===activeAB?'rgba(255,100,50,0.55)':'rgba(255,100,50,0.2)';
        ctx.lineWidth=1.5/vscale;ctx.setLineDash([4/vscale,4/vscale]);ctx.stroke();
        ctx.beginPath();ctx.arc(wp.x,wp.y,5/vscale,0,Math.PI*2);
        ctx.fillStyle='rgba(255,100,50,0.7)';ctx.fill();ctx.setLineDash([]);
      });
      ctx.restore();
    }
    ctx.restore();
  }
  // label
  if(vscale>0.25){
    ctx.save();
    ctx.font=`${Math.max(10,11*vscale)}px Inter,system-ui,sans-serif`;
    ctx.fillStyle='#aaa';
    ctx.fillText(`Board ${idx+1}  ${ab.w}×${ab.h}`,sx,sy-6*vscale);
    ctx.restore();
  }
}

function scheduleRender(live){
  if(rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(()=>{rafId=null;render(live);});
}
function render(live){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // dot grid
  const gs=40*vscale;
  if(gs>10){
    ctx.save();ctx.fillStyle='rgba(0,0,0,0.06)';
    const ox=((vx%gs)+gs)%gs,oy=((vy%gs)+gs)%gs;
    for(let x=ox;x<canvas.width;x+=gs) for(let y=oy;y<canvas.height;y+=gs){
      ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
  artboards.forEach((ab,i)=>drawArtboard(ab,i,live));
}

function exportPNG(){
  if(activeAB===null||!artboards[activeAB]) return;
  const ab=artboards[activeAB];
  const oc=document.createElement('canvas');oc.width=ab.w;oc.height=ab.h;
  const c2=oc.getContext('2d');
  c2.fillStyle='#fff';c2.fillRect(0,0,ab.w,ab.h);
  const chains=getABChains(ab,false);
  if(chains&&chains.length){
    const fo=p('opacity')/100,strokeOn=pck('stroke'),sw=p('swidth'),so=p('sopacity')/100;
    const{r,g,b}=hexToRgb(fillColor),{r:sr,g:sg,b:sb}=hexToRgb(strokeColor);
    c2.beginPath();
    chains.forEach(c=>{smoothPathCtx(c2,c);c2.closePath();});
    if(fo>0){c2.fillStyle=`rgba(${r},${g},${b},${fo})`;c2.fill('evenodd');}
    if(strokeOn){c2.strokeStyle=`rgba(${sr},${sg},${sb},${so})`;c2.lineWidth=sw;c2.lineJoin='round';c2.lineCap='round';c2.stroke();}
  }
  const a=document.createElement('a');a.download='blobit.png';a.href=oc.toDataURL();a.click();
}
function exportSVG(){
  if(activeAB===null||!artboards[activeAB]) return;
  const ab=artboards[activeAB];
  const chains=getABChains(ab,false);if(!chains||!chains.length) return;
  const fo=p('opacity')/100,strokeOn=pck('stroke'),sw=p('swidth'),so=p('sopacity')/100;
  function pathD(pts){
    if(pts.length<2) return '';
    let d=`M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const mx=((pts[i].x+pts[i+1].x)/2).toFixed(1),my=((pts[i].y+pts[i+1].y)/2).toFixed(1);
      if(i===0) d+=` L${mx},${my}`; else d+=` Q${pts[i].x.toFixed(1)},${pts[i].y.toFixed(1)} ${mx},${my}`;
    }
    return d+` L${pts[pts.length-1].x.toFixed(1)},${pts[pts.length-1].y.toFixed(1)} Z`;
  }
  const d=chains.map(c=>pathD(c)).join(' ');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${ab.w}" height="${ab.h}">
<rect width="100%" height="100%" fill="#fff"/>
<path d="${d}" fill="${fo>0?fillColor:'none'}" fill-opacity="${fo}" fill-rule="evenodd"
  stroke="${strokeOn?strokeColor:'none'}" stroke-width="${strokeOn?sw:0}"
  stroke-opacity="${so}" stroke-linejoin="round" stroke-linecap="round"/>
</svg>`;
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const a=document.createElement('a');a.download='blobit.svg';a.href=URL.createObjectURL(blob);a.click();
}

// init
(function(){
  const w=800,h=600;
  artboards=[{x:-w/2,y:-h/2,w,h,strokes:[],warpPoints:[]}];
  activeAB=0;
  resize();
  vx=canvas.width/2;vy=canvas.height/2;vscale=1;
  updateZoomLabel();
  scheduleRender();
})();
</script>
</body>
