<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blob It</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f0; color: #1a1a1a; font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
#canvas-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #f5f5f0; }
#main-canvas { cursor: crosshair; }
#toolbar { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; padding: 6px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.tool-btn { background: transparent; border: 1px solid transparent; color: #888; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; }
.tool-btn:hover { background: #f5f5f0; color: #333; }
.tool-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
#upload-label { background: transparent; border: 1px solid #ddd; color: #888; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; }
#upload-label:hover { border-color: #aaa; color: #333; }
#file-input { display: none; }
#panel { width: 256px; background: #fff; border-left: 1px solid #e8e8e2; padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
.panel-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #aaa; margin-bottom: 12px; font-weight: 600; }
.param-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.param-row label { font-size: 12px; color: #555; }
.param-row span { font-size: 11px; color: #aaa; min-width: 32px; text-align: right; }
input[type=range] { width: 100%; accent-color: #1a1a1a; margin-bottom: 10px; height: 2px; }
.color-row { display: flex; gap: 7px; margin-bottom: 10px; flex-wrap: wrap; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; outline: 2px solid transparent; outline-offset: 2px; }
.color-swatch.active { outline-color: #1a1a1a; }
.action-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e8e8e2; background: #f8f8f4; color: #444; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; margin-bottom: 6px; }
.action-btn:hover { background: #f0f0eb; border-color: #ccc; color: #1a1a1a; }
.action-btn.primary { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
.action-btn.primary:hover { background: #333; }
#status { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #aaa; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body>
<div id="canvas-area">
  <div id="toolbar">
    <button class="tool-btn active" id="btn-draw">Draw</button>
    <button class="tool-btn" id="btn-select">Select</button>
    <button class="tool-btn" id="btn-clear">Clear</button>
    <label id="upload-label">Upload<input type="file" id="file-input" accept="image/*"></label>
  </div>
  <canvas id="main-canvas"></canvas>
  <div id="status">Draw a path to generate organic shapes</div>
</div>
<div id="panel">
  <div class="panel-section">
    <h3>Blob Shape</h3>
    <div class="param-row"><label>Noise Amount</label><span id="val-noise">40</span></div>
    <input type="range" id="sl-noise" min="0" max="100" value="40">
    <div class="param-row"><label>Noise Scale</label><span id="val-nscale">50</span></div>
    <input type="range" id="sl-nscale" min="1" max="100" value="50">
    <div class="param-row"><label>Stroke Width</label><span id="val-width">20</span></div>
    <input type="range" id="sl-width" min="2" max="80" value="20">
    <div class="param-row"><label>Opacity</label><span id="val-opacity">85</span></div>
    <input type="range" id="sl-opacity" min="10" max="100" value="85">
  </div>
  <div class="panel-section">
    <h3>Branches</h3>
    <div class="param-row"><label>Density</label><span id="val-bdensity">30</span></div>
    <input type="range" id="sl-bdensity" min="0" max="100" value="30">
    <div class="param-row"><label>Length</label><span id="val-blength">40</span></div>
    <input type="range" id="sl-blength" min="0" max="100" value="40">
    <div class="param-row"><label>Thickness</label><span id="val-bthick">50</span></div>
    <input type="range" id="sl-bthick" min="10" max="100" value="50">
    <div class="param-row"><label>Recursion</label><span id="val-brecurse">2</span></div>
    <input type="range" id="sl-brecurse" min="0" max="4" value="2">
  </div>
  <div class="panel-section">
    <h3>Color</h3>
    <div class="color-row">
      <div class="color-swatch active" style="background:#ff6b9d" data-color="#ff6b9d"></div>
      <div class="color-swatch" style="background:#667eea" data-color="#667eea"></div>
      <div class="color-swatch" style="background:#43e97b" data-color="#43e97b"></div>
      <div class="color-swatch" style="background:#fa709a" data-color="#fa709a"></div>
      <div class="color-swatch" style="background:#a18cd1" data-color="#a18cd1"></div>
      <div class="color-swatch" style="background:#2af598" data-color="#2af598"></div>
      <div class="color-swatch" style="background:#f5576c" data-color="#f5576c"></div>
      <div class="color-swatch" style="background:#fcb69f" data-color="#fcb69f"></div>
      <div class="color-swatch" style="background:#1a1a1a" data-color="#1a1a1a"></div>
    </div>
  </div>
  <div class="panel-section">
    <h3>Actions</h3>
    <button class="action-btn primary" id="btn-generate">Regenerate</button>
    <button class="action-btn" id="btn-randomize">Randomize</button>
    <button class="action-btn" id="btn-export-png">Export PNG</button>
    <button class="action-btn" id="btn-export-svg">Export SVG</button>
  </div>
</div>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const canvasArea = document.getElementById('canvas-area');
let mode = 'draw', isDrawing = false, rawPoints = [], shapes = [], selectedShape = null;
let dragOffset = {x:0,y:0}, currentColor = '#ff6b9d';

function resizeCanvas() { canvas.width = canvasArea.clientWidth; canvas.height = canvasArea.clientHeight; render(); }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function p(id) { return parseInt(document.getElementById(id).value); }
function bindSlider(id, valId) {
  const sl = document.getElementById(id), vl = document.getElementById(valId);
  sl.addEventListener('input', () => { vl.textContent = sl.value; render(); });
}
['noise','nscale','width','opacity','bdensity','blength','bthick','brecurse'].forEach(n => bindSlider('sl-'+n,'val-'+n));

document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    currentColor = sw.dataset.color;
    render();
  });
});

document.getElementById('btn-draw').addEventListener('click', () => setMode('draw'));
document.getElementById('btn-select').addEventListener('click', () => setMode('select'));
document.getElementById('btn-clear').addEventListener('click', () => { shapes = []; rawPoints = []; render(); setStatus('Canvas cleared'); });

function setMode(m) {
  mode = m; canvas.style.cursor = m === 'draw' ? 'crosshair' : 'default';
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
}
function setStatus(t) { document.getElementById('status').textContent = t; }
function getPos(e) { const r = canvas.getBoundingClientRect(), s = e.touches ? e.touches[0] : e; return {x: s.clientX-r.left, y: s.clientY-r.top}; }

canvas.addEventListener('mousedown', e => {
  if (mode === 'draw') { isDrawing = true; rawPoints = [getPos(e)]; }
  else if (mode === 'select') {
    const pos = getPos(e); selectedShape = null;
    for (let i = shapes.length-1; i >= 0; i--) {
      if (pointNearPath(pos, shapes[i])) { selectedShape = i; dragOffset = {x: pos.x-(shapes[i].cx||0), y: pos.y-(shapes[i].cy||0)}; break; }
    }
  }
});

canvas.addEventListener('mousemove', e => {
  if (mode === 'draw' && isDrawing) { rawPoints.push(getPos(e)); renderPreview(); }
  else if (mode === 'select' && selectedShape !== null && e.buttons === 1) {
    const pos = getPos(e), s = shapes[selectedShape];
    const dx = pos.x - dragOffset.x - (s.cx||0), dy = pos.y - dragOffset.y - (s.cy||0);
    s.points = s.points.map(pt => ({x: pt.x+dx, y: pt.y+dy}));
    if (s.cx !== undefined) { s.cx += dx; s.cy += dy; }
    render();
  }
});

canvas.addEventListener('mouseup', () => {
  if (mode === 'draw' && isDrawing) {
    isDrawing = false;
    if (rawPoints.length > 5) { shapes.push({points: [...rawPoints], seed: Math.random()*10000}); setStatus('Path captured — adjust params or Regenerate'); }
    render();
  }
  selectedShape = null;
});

function renderPreview() {
  render();
  if (rawPoints.length < 2) return;
  ctx.save(); ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(rawPoints[0].x, rawPoints[0].y);
  for (let i = 1; i < rawPoints.length; i++) ctx.lineTo(rawPoints[i].x, rawPoints[i].y);
  ctx.stroke(); ctx.restore();
}

// --- math helpers ---
function noise2d(x, y, s) {
  const xi = Math.floor(x/s), yi = Math.floor(y/s), xf = x/s-xi, yf = y/s-yi;
  const r = (a,b) => (Math.sin(a*127.1+b*311.7)*43758.5453)%1;
  const lerp = (a,b,t) => a+t*(b-a), fade = t => t*t*(3-2*t);
  return lerp(lerp(r(xi,yi),r(xi+1,yi),fade(xf)), lerp(r(xi,yi+1),r(xi+1,yi+1),fade(xf)), fade(yf));
}

function resample(pts, count) {
  if (pts.length < 2) return pts;
  let total = 0;
  for (let i = 1; i < pts.length; i++) { const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y; total+=Math.sqrt(dx*dx+dy*dy); }
  const step = total/count, result = [pts[0]]; let dist = 0, pi = 0;
  for (let i = 1; i < count; i++) {
    const target = i*step;
    while (pi < pts.length-2) { const dx=pts[pi+1].x-pts[pi].x,dy=pts[pi+1].y-pts[pi].y,seg=Math.sqrt(dx*dx+dy*dy); if(dist+seg>=target){const t=(target-dist)/seg;result.push({x:pts[pi].x+dx*t,y:pts[pi].y+dy*t});break;}dist+=seg;pi++; }
  }
  return result;
}

// Build organic stroke outline: offset path on both sides with noise
function getStrokeOutline(shape) {
  const noiseAmt = p('sl-noise')/100, noiseScale = p('sl-nscale')*2+5;
  const halfW = p('sl-width')/2, s = shape.seed||0, pts = shape.points;
  if (pts.length < 2) return null;
  const count = Math.max(pts.length, 60);
  const resampled = resample(pts, count);
  // compute center for drag tracking
  shape.cx = resampled.reduce((a,pt)=>a+pt.x,0)/resampled.length;
  shape.cy = resampled.reduce((a,pt)=>a+pt.y,0)/resampled.length;

  const left = [], right = [];
  for (let i = 0; i < resampled.length; i++) {
    const prev = resampled[Math.max(0,i-1)], next = resampled[Math.min(resampled.length-1,i+1)];
    const tx = next.x-prev.x, ty = next.y-prev.y, tlen = Math.sqrt(tx*tx+ty*ty)||1;
    // normal perpendicular to tangent
    const nx = -ty/tlen, ny = tx/tlen;
    const pt = resampled[i];
    const n = noise2d(pt.x*0.01+s, pt.y*0.01+s, noiseScale)*2-1;
    const w = halfW + n*noiseAmt*halfW*1.5;
    left.push({x: pt.x + nx*w, y: pt.y + ny*w});
    right.push({x: pt.x - nx*w, y: pt.y - ny*w});
  }
  return {left, right};
}

function pointNearPath(pt, shape) {
  const pts = shape.points; if (!pts || pts.length < 2) return false;
  const thresh = p('sl-width') + 10;
  for (let i = 1; i < pts.length; i++) {
    const ax=pts[i-1].x,ay=pts[i-1].y,bx=pts[i].x,by=pts[i].y;
    const dx=bx-ax,dy=by-ay,len2=dx*dx+dy*dy;
    if (len2===0) continue;
    const t=Math.max(0,Math.min(1,((pt.x-ax)*dx+(pt.y-ay)*dy)/len2));
    const px=ax+t*dx,py=ay+t*dy,d=Math.sqrt((pt.x-px)**2+(pt.y-py)**2);
    if (d < thresh) return true;
  }
  return false;
}

function drawBranch(x, y, nx, ny, len, thick, depth) {
  if (depth < 0 || len < 2 || thick < 0.2) return;
  const angle = Math.atan2(ny, nx);
  const ex = x+nx*len+(Math.random()-0.5)*len*0.3, ey = y+ny*len+(Math.random()-0.5)*len*0.3;
  const alpha = Math.floor(p('sl-opacity')*0.45*2.55).toString(16).padStart(2,'0');
  ctx.beginPath(); ctx.moveTo(x,y);
  ctx.quadraticCurveTo(x+nx*len*0.5+(Math.random()-0.5)*len*0.3, y+ny*len*0.5+(Math.random()-0.5)*len*0.3, ex, ey);
  ctx.strokeStyle = currentColor+alpha; ctx.lineWidth = thick; ctx.lineCap = 'round'; ctx.stroke();
  if (depth > 0) {
    const spread = 0.45+Math.random()*0.2;
    drawBranch(ex,ey,Math.cos(angle+spread),Math.sin(angle+spread),len*0.6,thick*0.65,depth-1);
    if (Math.random()>0.35) drawBranch(ex,ey,Math.cos(angle-spread),Math.sin(angle-spread),len*0.55,thick*0.6,depth-1);
  }
}

function drawBranches(outline, cx, cy) {
  const density = p('sl-bdensity')/100, lenFactor = p('sl-blength')/100;
  const thickFactor = p('sl-bthick')/100, recurse = p('sl-brecurse');
  if (density === 0 || lenFactor === 0) return;
  const allEdge = [...outline.left, ...[...outline.right].reverse()];
  const count = Math.max(1, Math.floor(density*20));
  const step = Math.max(1, Math.floor(allEdge.length/count));
  for (let i = 0; i < allEdge.length; i += step) {
    const pt = allEdge[i], dx = pt.x-cx, dy = pt.y-cy, dist = Math.sqrt(dx*dx+dy*dy)||1;
    drawBranch(pt.x,pt.y,dx/dist,dy/dist,(15+Math.random()*35)*lenFactor,(1+Math.random()*2)*thickFactor,recurse);
  }
}

function render() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const opacity = p('sl-opacity')/100;
  shapes.forEach((shape, idx) => {
    const outline = getStrokeOutline(shape);
    if (!outline) return;
    const {left, right} = outline;
    const cx = shape.cx||canvas.width/2, cy = shape.cy||canvas.height/2;

    // draw filled stroke outline (organic path shape)
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.fillStyle = currentColor;
    ctx.beginPath();
    ctx.moveTo(left[0].x, left[0].y);
    for (let i = 1; i < left.length; i++) ctx.lineTo(left[i].x, left[i].y);
    // round cap at end
    const endPt = shape.points[shape.points.length-1];
    ctx.arc(right[right.length-1].x, right[right.length-1].y, 0, 0, Math.PI*2);
    for (let i = right.length-1; i >= 0; i--) ctx.lineTo(right[i].x, right[i].y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    drawBranches(outline, cx, cy);

    if (selectedShape === idx) {
      ctx.save(); ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(left[0].x, left[0].y);
      for (let i = 1; i < left.length; i++) ctx.lineTo(left[i].x, left[i].y);
      for (let i = right.length-1; i >= 0; i--) ctx.lineTo(right[i].x, right[i].y);
      ctx.closePath(); ctx.stroke(); ctx.restore();
    }
  });
}

document.getElementById('btn-generate').addEventListener('click', () => { shapes.forEach(s => s.seed = Math.random()*10000); render(); setStatus('Regenerated!'); });

document.getElementById('btn-randomize').addEventListener('click', () => {
  const rnd = (id,min,max) => { const v=Math.floor(Math.random()*(max-min)+min); document.getElementById('sl-'+id).value=v; document.getElementById('val-'+id).textContent=v; };
  rnd('noise',10,80); rnd('nscale',10,80); rnd('width',8,50); rnd('bdensity',0,60); rnd('blength',10,70); rnd('bthick',20,80);
  const swatches = document.querySelectorAll('.color-swatch'), pick = swatches[Math.floor(Math.random()*swatches.length)];
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  pick.classList.add('active'); currentColor = pick.dataset.color;
  shapes.forEach(s => s.seed = Math.random()*10000); render();
});

document.getElementById('btn-export-png').addEventListener('click', () => {
  const a = document.createElement('a'); a.download = 'blobit.png'; a.href = canvas.toDataURL('image/png'); a.click();
});

document.getElementById('btn-export-svg').addEventListener('click', () => {
  const svgParts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}">`];
  svgParts.push(`<rect width="100%" height="100%" fill="#f5f5f0"/>`);
  shapes.forEach(shape => {
    const outline = getStrokeOutline(shape); if (!outline) return;
    const {left, right} = outline;
    const d = left.map((pt,i)=>(i===0?`M${pt.x.toFixed(1)},${pt.y.toFixed(1)}`:`L${pt.x.toFixed(1)},${pt.y.toFixed(1)}`)).join(' ')
      + right.slice().reverse().map(pt=>`L${pt.x.toFixed(1)},${pt.y.toFixed(1)}`).join(' ') + ' Z';
    svgParts.push(`<path d="${d}" fill="${currentColor}" opacity="${p('sl-opacity')/100}"/>`);
  });
  svgParts.push('</svg>');
  const blob = new Blob([svgParts.join('\n')], {type:'image/svg+xml'});
  const a = document.createElement('a'); a.download = 'blobit.svg'; a.href = URL.createObjectURL(blob); a.click();
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const img = new Image(), url = URL.createObjectURL(file);
  img.onload = () => { ctx.drawImage(img,0,0,canvas.width,canvas.height); URL.revokeObjectURL(url); };
  img.src = url;
});
</script>
</body>
</html>
