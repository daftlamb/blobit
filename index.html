<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blob It</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f0; color: #1a1a1a; font-family: 'Inter', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
#canvas-area { flex: 1; position: relative; background: #f5f5f0; overflow: hidden; }
#main-canvas { cursor: crosshair; display: block; width: 100%; height: 100%; }
#toolbar { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; padding: 6px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.tool-btn { background: transparent; border: 1px solid transparent; color: #888; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; }
.tool-btn:hover { background: #f5f5f0; color: #333; }
.tool-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
#upload-label { background: transparent; border: 1px solid #ddd; color: #888; padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; }
#upload-label:hover { border-color: #aaa; color: #333; }
#file-input { display: none; }
#panel { width: 256px; background: #fff; border-left: 1px solid #e8e8e2; padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
.panel-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: #aaa; margin-bottom: 12px; font-weight: 600; }
.param-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.param-row label { font-size: 12px; color: #555; }
.param-row span { font-size: 11px; color: #aaa; min-width: 32px; text-align: right; }
input[type=range] { width: 100%; accent-color: #1a1a1a; margin-bottom: 10px; height: 2px; }
.color-row { display: flex; gap: 7px; margin-bottom: 10px; flex-wrap: wrap; }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; outline: 2px solid transparent; outline-offset: 2px; }
.color-swatch.active { outline-color: #1a1a1a; }
.action-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #e8e8e2; background: #f8f8f4; color: #444; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; margin-bottom: 6px; }
.action-btn:hover { background: #f0f0eb; border-color: #ccc; color: #1a1a1a; }
.action-btn.primary { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
.action-btn.primary:hover { background: #333; }
#status { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #aaa; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body>
<div id="canvas-area">
  <div id="toolbar">
    <button class="tool-btn active" id="btn-draw">Draw</button>
    <button class="tool-btn" id="btn-clear">Clear</button>
    <label id="upload-label">Upload<input type="file" id="file-input" accept="image/*"></label>
  </div>
  <canvas id="main-canvas"></canvas>
  <div id="status">Draw strokes — they merge when close</div>
</div>
<div id="panel">
  <div class="panel-section">
    <h3>Blob</h3>
    <div class="param-row"><label>Radius</label><span id="val-radius">32</span></div>
    <input type="range" id="sl-radius" min="8" max="80" value="32">
    <div class="param-row"><label>Threshold</label><span id="val-thresh">50</span></div>
    <input type="range" id="sl-thresh" min="20" max="80" value="50">
    <div class="param-row"><label>Noise</label><span id="val-noise">30</span></div>
    <input type="range" id="sl-noise" min="0" max="80" value="30">
    <div class="param-row"><label>Opacity</label><span id="val-opacity">90</span></div>
    <input type="range" id="sl-opacity" min="20" max="100" value="90">
  </div>
  <div class="panel-section">
    <h3>Color</h3>
    <div class="color-row">
      <div class="color-swatch active" style="background:#ff6b9d" data-color="#ff6b9d"></div>
      <div class="color-swatch" style="background:#667eea" data-color="#667eea"></div>
      <div class="color-swatch" style="background:#43e97b" data-color="#43e97b"></div>
      <div class="color-swatch" style="background:#fa709a" data-color="#fa709a"></div>
      <div class="color-swatch" style="background:#a18cd1" data-color="#a18cd1"></div>
      <div class="color-swatch" style="background:#f5576c" data-color="#f5576c"></div>
      <div class="color-swatch" style="background:#fcb69f" data-color="#fcb69f"></div>
      <div class="color-swatch" style="background:#1a1a1a" data-color="#1a1a1a"></div>
    </div>
  </div>
  <div class="panel-section">
    <h3>Actions</h3>
    <button class="action-btn primary" id="btn-regen">Regenerate</button>
    <button class="action-btn" id="btn-export-png">Export PNG</button>
  </div>
</div>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const area = document.getElementById('canvas-area');

let strokes = []; // each stroke: array of {x,y}
let currentStroke = null;
let isDrawing = false;
let currentColor = '#ff6b9d';
let seeds = [];

function resize() {
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  render();
}
window.addEventListener('resize', resize);
resize();

function p(id) { return parseInt(document.getElementById(id).value); }
function bindSlider(id, valId) {
  const sl = document.getElementById(id), vl = document.getElementById(valId);
  sl.addEventListener('input', () => { vl.textContent = sl.value; render(); });
}
['radius','thresh','noise','opacity'].forEach(n => bindSlider('sl-'+n,'val-'+n));

document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    currentColor = sw.dataset.color;
    render();
  });
});

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return { x: (s.clientX - r.left) * (canvas.width / r.width), y: (s.clientY - r.top) * (canvas.height / r.height) };
}

canvas.addEventListener('mousedown', e => {
  isDrawing = true;
  currentStroke = [getPos(e)];
  seeds.push(Math.random() * 9999);
});
canvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const pos = getPos(e);
  const last = currentStroke[currentStroke.length - 1];
  const dx = pos.x - last.x, dy = pos.y - last.y;
  if (dx*dx + dy*dy > 16) { currentStroke.push(pos); renderLive(); }
});
canvas.addEventListener('mouseup', () => {
  if (isDrawing && currentStroke && currentStroke.length > 1) {
    strokes.push(currentStroke);
  }
  isDrawing = false; currentStroke = null; render();
});
canvas.addEventListener('mouseleave', () => {
  if (isDrawing && currentStroke && currentStroke.length > 1) strokes.push(currentStroke);
  isDrawing = false; currentStroke = null; render();
});

document.getElementById('btn-clear').addEventListener('click', () => { strokes = []; seeds = []; render(); });
document.getElementById('btn-draw').addEventListener('click', () => {});
document.getElementById('btn-regen').addEventListener('click', () => { seeds = strokes.map(() => Math.random()*9999); render(); });
document.getElementById('btn-export-png').addEventListener('click', () => {
  const a = document.createElement('a'); a.download = 'blobit.png'; a.href = canvas.toDataURL(); a.click();
});

// --- noise ---
function snoise(x, y, s) {
  const xi = Math.floor(x/s), yi = Math.floor(y/s), xf = x/s-xi, yf = y/s-yi;
  const h = (a,b) => (Math.sin(a*127.1+b*311.7)*43758.5453+1)%1;
  const lerp = (a,b,t) => a+t*(b-a), fade = t => t*t*(3-2*t);
  return lerp(lerp(h(xi,yi),h(xi+1,yi),fade(xf)), lerp(h(xi,yi+1),h(xi+1,yi+1),fade(xf)), fade(yf))*2-1;
}

// --- metaball field: sum of influence from all stroke points ---
// Each stroke point contributes r^2 / (d^2 + eps)
function fieldAt(x, y, allPts, radius) {
  let sum = 0;
  const r2 = radius * radius;
  for (let i = 0; i < allPts.length; i++) {
    const dx = x - allPts[i].x, dy = y - allPts[i].y;
    const d2 = dx*dx + dy*dy;
    sum += r2 / (d2 + 1);
  }
  return sum;
}

// Resample stroke to evenly spaced points
function resample(pts, spacing) {
  if (pts.length < 2) return pts;
  const out = [pts[0]];
  let carry = 0;
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x-pts[i-1].x, dy = pts[i].y-pts[i-1].y;
    const seg = Math.sqrt(dx*dx+dy*dy);
    let d = carry;
    while (d < seg) {
      const t = d/seg;
      out.push({x: pts[i-1].x+dx*t, y: pts[i-1].y+dy*t});
      d += spacing;
    }
    carry = d - seg;
  }
  return out;
}

// Marching squares on a grid
function marchingSquares(field, w, h, step, threshold) {
  const cols = Math.ceil(w/step)+1, rows = Math.ceil(h/step)+1;
  // sample grid
  const grid = new Float32Array(cols*rows);
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    grid[r*cols+c] = field(c*step, r*step);
  }
  const segments = [];
  const lerp = (a,b,va,vb,t) => a + (b-a)*((t-va)/(vb-va));

  for (let r = 0; r < rows-1; r++) for (let c = 0; c < cols-1; c++) {
    const x = c*step, y = r*step;
    const v00 = grid[r*cols+c], v10 = grid[r*cols+c+1];
    const v01 = grid[(r+1)*cols+c], v11 = grid[(r+1)*cols+c+1];
    const idx = (v00>threshold?8:0)|(v10>threshold?4:0)|(v11>threshold?2:0)|(v01>threshold?1:0);
    if (idx===0||idx===15) continue;
    // edge midpoints
    const top    = {x: lerp(x,x+step,v00,v10,threshold), y};
    const right  = {x: x+step, y: lerp(y,y+step,v10,v11,threshold)};
    const bottom = {x: lerp(x,x+step,v01,v11,threshold), y: y+step};
    const left   = {x, y: lerp(y,y+step,v00,v01,threshold)};
    const edges = {top,right,bottom,left};
    // lookup table: pairs of edges to connect
    const table = {
      1:[['bottom','left']], 2:[['right','bottom']], 3:[['right','left']],
      4:[['top','right']], 5:[['top','left'],['right','bottom']], 6:[['top','bottom']],
      7:[['top','left']], 8:[['top','left']], 9:[['top','bottom']],
      10:[['top','right'],['bottom','left']], 11:[['top','right']],
      12:[['right','left']], 13:[['right','bottom']], 14:[['bottom','left']]
    };
    (table[idx]||[]).forEach(([a,b]) => segments.push([edges[a], edges[b]]));
  }
  return segments;
}

// Connect segments into polylines
function connectSegments(segs) {
  if (!segs.length) return [];
  const eps = 1.5;
  const used = new Uint8Array(segs.length);
  const chains = [];
  for (let i = 0; i < segs.length; i++) {
    if (used[i]) continue;
    used[i] = 1;
    const chain = [segs[i][0], segs[i][1]];
    let changed = true;
    while (changed) {
      changed = false;
      const tail = chain[chain.length-1];
      for (let j = 0; j < segs.length; j++) {
        if (used[j]) continue;
        const [a,b] = segs[j];
        const da = (tail.x-a.x)**2+(tail.y-a.y)**2;
        const db = (tail.x-b.x)**2+(tail.y-b.y)**2;
        if (da < eps*eps) { chain.push(b); used[j]=1; changed=true; break; }
        if (db < eps*eps) { chain.push(a); used[j]=1; changed=true; break; }
      }
    }
    chains.push(chain);
  }
  return chains;
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function renderLive() {
  render(true);
}

function render(live) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const allStrokes = live && currentStroke ? [...strokes, currentStroke] : strokes;
  if (!allStrokes.length) return;

  const radius = p('sl-radius');
  const threshold = p('sl-thresh') / 100 * 2; // scale to field values
  const noiseAmt = p('sl-noise') / 100;
  const opacity = p('sl-opacity') / 100;
  const step = Math.max(3, Math.floor(radius / 5)); // grid resolution

  // resample all strokes
  const spacing = Math.max(2, radius * 0.4);
  const allPts = [];
  allStrokes.forEach(s => resample(s, spacing).forEach(pt => allPts.push(pt)));

  if (!allPts.length) return;

  // field function with noise perturbation
  const noiseScale = radius * 1.2;
  const field = (x, y) => {
    const n = noiseAmt > 0 ? snoise(x, y, noiseScale) * noiseAmt * radius * 0.5 : 0;
    return fieldAt(x + n, y + n, allPts, radius);
  };

  const segs = marchingSquares(field, canvas.width, canvas.height, step, threshold);
  const chains = connectSegments(segs);

  if (!chains.length) return;

  const {r,g,b} = hexToRgb(currentColor);
  ctx.save();
  ctx.fillStyle = `rgba(${r},${g},${b},${opacity})`;
  ctx.beginPath();
  chains.forEach(chain => {
    if (chain.length < 2) return;
    ctx.moveTo(chain[0].x, chain[0].y);
    for (let i = 1; i < chain.length; i++) ctx.lineTo(chain[i].x, chain[i].y);
    ctx.closePath();
  });
  ctx.fill('evenodd');
  ctx.restore();
}
</script>
</body>
</html>
