<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blob It</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#f5f5f0; font-family:'Inter',system-ui,sans-serif; height:100dvh; overflow:hidden; display:flex; flex-direction:column; }

/* canvas fills full screen */
#canvas-area { flex:1; position:relative; overflow:hidden; }
#main-canvas { display:block; width:100%; height:100%; touch-action:none; }

/* toolbar */
#toolbar { position:absolute; top:12px; left:50%; transform:translateX(-50%); display:flex; gap:5px; background:rgba(255,255,255,0.92); backdrop-filter:blur(8px); border:1px solid #e0e0d8; border-radius:10px; padding:5px; z-index:30; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.tool-btn { background:transparent; border:1px solid transparent; color:#888; padding:6px 12px; border-radius:7px; cursor:pointer; font-size:12px; font-weight:500; white-space:nowrap; }
.tool-btn.active { background:#1a1a1a; color:#fff; }

/* quick bar — fixed at bottom, always visible */
#quick-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e8e8e2; padding:8px 14px; display:flex; align-items:center; gap:9px; z-index:40; height:52px; }
.swatch { width:22px; height:22px; border-radius:50%; cursor:pointer; outline:2px solid transparent; outline-offset:2px; flex-shrink:0; }
.swatch.active { outline-color:#1a1a1a; }
#quick-bar input[type=color] { width:26px; height:26px; border:1px solid #e0e0d8; border-radius:50%; padding:1px; cursor:pointer; background:none; flex-shrink:0; }
#quick-bar input[type=color]::-webkit-color-swatch-wrapper { padding:0; border-radius:50%; }
#quick-bar input[type=color]::-webkit-color-swatch { border:none; border-radius:50%; }
#panel-toggle { margin-left:auto; background:none; border:none; color:#aaa; font-size:18px; cursor:pointer; padding:2px 8px; line-height:1; flex-shrink:0; }

/* drawer — fixed above quick bar, slides up */
#drawer {
  position:fixed; left:0; right:0; bottom:52px;
  background:#fff; border-top:1px solid #e8e8e2;
  z-index:35;
  max-height:0; overflow:hidden;
  transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1);
}
#drawer.open { max-height:60dvh; }
#drawer-inner {
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  max-height:60dvh;
  padding:14px 16px 20px;
  display:flex; flex-direction:column; gap:16px;
}

.panel-section h3 { font-size:9px; text-transform:uppercase; letter-spacing:0.12em; color:#bbb; margin-bottom:10px; font-weight:600; }
.param-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:1px; }
.param-row label { font-size:12px; color:#555; }
.param-row span { font-size:11px; color:#aaa; min-width:28px; text-align:right; }
input[type=range] { width:100%; accent-color:#1a1a1a; margin-bottom:6px; height:20px; }
.color-picker-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.color-picker-row label { font-size:12px; color:#555; flex:1; }
.color-picker-row input[type=color] { width:28px; height:24px; border:1px solid #e0e0d8; border-radius:4px; padding:1px; cursor:pointer; background:none; }
.color-picker-row input[type=color]::-webkit-color-swatch-wrapper { padding:0; }
.color-picker-row input[type=color]::-webkit-color-swatch { border:none; border-radius:3px; }
.toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.toggle-row label { font-size:12px; color:#555; }
.toggle { position:relative; width:32px; height:18px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:#ddd; border-radius:9px; cursor:pointer; transition:0.2s; }
.toggle-slider:before { content:''; position:absolute; width:14px; height:14px; left:2px; top:2px; background:#fff; border-radius:50%; transition:0.2s; }
.toggle input:checked + .toggle-slider { background:#1a1a1a; }
.toggle input:checked + .toggle-slider:before { transform:translateX(14px); }
.action-btn { width:100%; padding:10px; border-radius:8px; border:1px solid #e8e8e2; background:#f8f8f4; color:#444; cursor:pointer; font-size:12px; font-weight:500; margin-bottom:6px; }
.action-btn.primary { background:#1a1a1a; border-color:#1a1a1a; color:#fff; }
.upload-area { border:1.5px dashed #ccc; border-radius:8px; padding:12px; text-align:center; cursor:pointer; font-size:11px; color:#aaa; margin-bottom:8px; }
#img-preview { width:100%; border-radius:6px; display:none; margin-bottom:8px; }
.divider { height:1px; background:#f0f0ea; margin:0 -16px; }

/* warp point overlay */
.warp-dot { position:absolute; border-radius:50%; border:2px solid rgba(255,100,50,0.8); background:rgba(255,100,50,0.15); pointer-events:none; transform:translate(-50%,-50%); }
</style>
</head>
<body>
<div id="canvas-area">
  <div id="toolbar">
    <button class="tool-btn active" id="btn-draw">Draw</button>
    <button class="tool-btn" id="btn-warp">Warp</button>
    <button class="tool-btn" id="btn-clear">Clear</button>
  </div>
  <canvas id="main-canvas"></canvas>
</div>

<div id="quick-bar">
  <div class="swatch active" style="background:#ff6b9d" data-color="#ff6b9d"></div>
  <div class="swatch" style="background:#667eea" data-color="#667eea"></div>
  <div class="swatch" style="background:#43e97b" data-color="#43e97b"></div>
  <div class="swatch" style="background:#a18cd1" data-color="#a18cd1"></div>
  <div class="swatch" style="background:#fcb69f" data-color="#fcb69f"></div>
  <div class="swatch" style="background:#1a1a1a" data-color="#1a1a1a"></div>
  <input type="color" id="fill-color" value="#ff6b9d">
  <button id="panel-toggle">⋯</button>
</div>

<div id="drawer">
  <div id="drawer-inner">
    <div class="panel-section">
      <h3>Blob</h3>
      <div class="param-row"><label>Radius</label><span id="val-radius">36</span></div>
      <input type="range" id="sl-radius" min="10" max="80" value="36">
      <div class="param-row"><label>Smooth</label><span id="val-smooth">60</span></div>
      <input type="range" id="sl-smooth" min="10" max="100" value="60">
      <div class="param-row"><label>Loose</label><span id="val-loose">40</span></div>
      <input type="range" id="sl-loose" min="0" max="100" value="40">
      <div class="param-row"><label>Noise</label><span id="val-noise">30</span></div>
      <input type="range" id="sl-noise" min="0" max="100" value="30">
      <div class="param-row"><label>Opacity</label><span id="val-opacity">90</span></div>
      <input type="range" id="sl-opacity" min="0" max="100" value="90">
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <h3>Warp Points</h3>
      <div class="param-row"><label>Radius</label><span id="val-wradius">60</span></div>
      <input type="range" id="sl-wradius" min="20" max="200" value="60">
      <div class="param-row"><label>Strength</label><span id="val-wstrength">50</span></div>
      <input type="range" id="sl-wstrength" min="1" max="100" value="50">
      <div style="font-size:10px;color:#aaa;margin-top:2px;">Tap canvas in Warp mode to add · Right-click to remove</div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <h3>Branch</h3>
      <div class="toggle-row">
        <label>Hold to grow</label>
        <label class="toggle"><input type="checkbox" id="ck-branch" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="param-row"><label>Density</label><span id="val-bdensity">40</span></div>
      <input type="range" id="sl-bdensity" min="5" max="100" value="40">
      <div class="param-row"><label>Length</label><span id="val-blength">50</span></div>
      <input type="range" id="sl-blength" min="10" max="100" value="50">
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <h3>Stroke</h3>
      <div class="toggle-row">
        <label>Enable</label>
        <label class="toggle"><input type="checkbox" id="ck-stroke"><span class="toggle-slider"></span></label>
      </div>
      <div class="param-row"><label>Width</label><span id="val-swidth">3</span></div>
      <input type="range" id="sl-swidth" min="1" max="20" value="3">
      <div class="param-row"><label>Opacity</label><span id="val-sopacity">100</span></div>
      <input type="range" id="sl-sopacity" min="10" max="100" value="100">
      <div class="color-picker-row"><label>Color</label><input type="color" id="stroke-color" value="#1a1a1a"></div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <h3>Image → Blob</h3>
      <div class="upload-area" id="upload-area">Tap to upload image</div>
      <input type="file" id="file-input" accept="image/*" style="display:none">
      <img id="img-preview">
      <div class="param-row"><label>Threshold</label><span id="val-ethresh">30</span></div>
      <input type="range" id="sl-ethresh" min="2" max="80" step="1" value="30">
      <div class="param-row"><label>Blur</label><span id="val-eblur">1</span></div>
      <input type="range" id="sl-eblur" min="0" max="6" step="0.5" value="1">
      <div class="param-row"><label>Detail</label><span id="val-edetail">60</span></div>
      <input type="range" id="sl-edetail" min="10" max="100" value="60">
      <button class="action-btn" id="btn-apply-img">Apply to Canvas</button>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <h3>Export</h3>
      <button class="action-btn primary" id="btn-export-png">Export PNG</button>
      <button class="action-btn" id="btn-export-svg">Export SVG</button>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const area = document.getElementById('canvas-area');
const drawer = document.getElementById('drawer');

let strokes=[], currentStroke=null, isDrawing=false;
let warpPoints=[];  // {x, y, r, strength}
let fillColor='#ff6b9d', strokeColor='#1a1a1a';
let rafId=null, holdTimer=null, holdActive=false, uploadedImage=null;
let drawerOpen=false, currentTool='draw'; // 'draw' | 'warp'

// drawer
document.getElementById('panel-toggle').addEventListener('click', () => {
  drawerOpen=!drawerOpen;
  drawer.classList.toggle('open', drawerOpen);
  document.getElementById('panel-toggle').textContent=drawerOpen?'✕':'⋯';
});

function resize() { canvas.width=area.clientWidth; canvas.height=area.clientHeight; render(); }
window.addEventListener('resize', resize); resize();

function p(id){ return parseFloat(document.getElementById(id).value); }
function bindSlider(id,valId){
  const sl=document.getElementById(id),vl=document.getElementById(valId);
  sl.addEventListener('input',()=>{ vl.textContent=sl.value; scheduleRender(); });
}
['radius','smooth','loose','noise','opacity','swidth','sopacity','bdensity','blength','ethresh','eblur','edetail','wradius','wstrength']
  .forEach(n=>bindSlider('sl-'+n,'val-'+n));
document.getElementById('ck-stroke').addEventListener('change', scheduleRender);

// tool buttons
document.getElementById('btn-draw').addEventListener('click',()=>setTool('draw'));
document.getElementById('btn-warp').addEventListener('click',()=>setTool('warp'));
function setTool(t){
  currentTool=t;
  document.getElementById('btn-draw').classList.toggle('active',t==='draw');
  document.getElementById('btn-warp').classList.toggle('active',t==='warp');
  canvas.style.cursor=t==='warp'?'crosshair':'crosshair';
  renderWarpOverlay();
}

// swatches
document.querySelectorAll('.swatch').forEach(sw=>{
  sw.addEventListener('click',()=>{
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active'); fillColor=sw.dataset.color;
    document.getElementById('fill-color').value=fillColor; scheduleRender();
  });
});
document.getElementById('fill-color').addEventListener('input',e=>{
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  fillColor=e.target.value; scheduleRender();
});
document.getElementById('stroke-color').addEventListener('input',e=>{ strokeColor=e.target.value; scheduleRender(); });

// pointer helpers
function getPos(e){
  const r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
}

// warp overlay dots
function renderWarpOverlay(){
  document.querySelectorAll('.warp-dot').forEach(d=>d.remove());
  if(currentTool!=='warp') return;
  const r=canvas.getBoundingClientRect();
  warpPoints.forEach((wp,i)=>{
    const dot=document.createElement('div');
    dot.className='warp-dot';
    const scaleX=r.width/canvas.width, scaleY=r.height/canvas.height;
    const vr=wp.r*scaleX;
    dot.style.cssText=`left:${r.left+wp.x*scaleX}px;top:${r.top+wp.y*scaleY}px;width:${vr*2}px;height:${vr*2}px;`;
    area.appendChild(dot);
  });
}

// canvas events
function onStart(e){
  if(e.target!==canvas) return; e.preventDefault();
  const pos=getPos(e);
  if(currentTool==='warp'){
    warpPoints.push({x:pos.x,y:pos.y,r:p('sl-wradius'),strength:p('sl-wstrength')/100});
    renderWarpOverlay(); scheduleRender(); return;
  }
  isDrawing=true; holdActive=false; currentStroke=[pos];
  if(document.getElementById('ck-branch').checked)
    holdTimer=setTimeout(()=>{ holdActive=true; growBranches(); },500);
}
function onMove(e){
  if(!isDrawing||currentTool!=='draw') return; e.preventDefault();
  const pos=getPos(e),last=currentStroke[currentStroke.length-1];
  if((pos.x-last.x)**2+(pos.y-last.y)**2>6){ currentStroke.push(pos); scheduleRender(true); }
}
function onEnd(){
  if(!isDrawing) return;
  if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
  holdActive=false;
  if(currentStroke?.length>1) strokes.push(currentStroke);
  isDrawing=false; currentStroke=null; scheduleRender();
}
function onRightClick(e){
  if(currentTool!=='warp') return; e.preventDefault();
  const pos=getPos(e);
  // remove closest warp point within 40px
  let best=-1,bestD=40*40;
  warpPoints.forEach((wp,i)=>{
    const d=(wp.x-pos.x)**2+(wp.y-pos.y)**2;
    if(d<bestD){bestD=d;best=i;}
  });
  if(best>=0){ warpPoints.splice(best,1); renderWarpOverlay(); scheduleRender(); }
}

canvas.addEventListener('mousedown',onStart);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onEnd);
canvas.addEventListener('mouseleave',onEnd);
canvas.addEventListener('contextmenu',onRightClick);
canvas.addEventListener('touchstart',onStart,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onEnd);
canvas.addEventListener('touchcancel',onEnd);

// long-press delete warp on mobile
let touchHoldTimer=null;
canvas.addEventListener('touchstart',e=>{
  if(currentTool!=='warp') return;
  touchHoldTimer=setTimeout(()=>{
    const pos=getPos(e);
    let best=-1,bestD=60*60;
    warpPoints.forEach((wp,i)=>{const d=(wp.x-pos.x)**2+(wp.y-pos.y)**2;if(d<bestD){bestD=d;best=i;}});
    if(best>=0){warpPoints.splice(best,1);renderWarpOverlay();scheduleRender();}
  },600);
},{passive:true});
canvas.addEventListener('touchend',()=>{ if(touchHoldTimer){clearTimeout(touchHoldTimer);touchHoldTimer=null;} });

function growBranches(){
  if(!isDrawing||!currentStroke||currentStroke.length<2) return;
  const radius=p('sl-radius'),density=p('sl-bdensity')/100,lf=p('sl-blength')/100;
  const src=currentStroke,num=Math.max(1,Math.floor(src.length*density*0.25));
  for(let b=0;b<num;b++){
    const idx=Math.floor(Math.random()*(src.length-1)),pt=src[idx];
    const nx=src[Math.min(idx+1,src.length-1)],px2=src[Math.max(idx-1,0)];
    const dx=nx.x-px2.x,dy=nx.y-px2.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    const perpX=-dy/len,perpY=dx/len,angle=(Math.random()-0.5)*Math.PI*0.9;
    const cos=Math.cos(angle),sin=Math.sin(angle);
    const bx=perpX*cos-perpY*sin,by=perpX*sin+perpY*cos;
    const bl=radius*(1.5+Math.random()*2.5)*lf,steps=Math.max(3,Math.floor(bl/5));
    const branch=[pt];
    for(let s=1;s<=steps;s++){const t=s/steps;branch.push({x:pt.x+bx*bl*t+(Math.random()-0.5)*radius*0.25,y:pt.y+by*bl*t+(Math.random()-0.5)*radius*0.25});}
    strokes.push(branch);
  }
  scheduleRender();
  if(holdActive&&isDrawing) setTimeout(growBranches,700);
}

document.getElementById('btn-clear').addEventListener('click',()=>{ strokes=[]; warpPoints=[]; renderWarpOverlay(); scheduleRender(); });
document.getElementById('btn-export-png').addEventListener('click',()=>{
  const a=document.createElement('a');a.download='blobit.png';a.href=canvas.toDataURL();a.click();
});
document.getElementById('btn-export-svg').addEventListener('click',exportSVG);

// image upload
const uploadArea=document.getElementById('upload-area'),fileInput=document.getElementById('file-input');
uploadArea.addEventListener('click',()=>fileInput.click());
uploadArea.addEventListener('dragover',e=>e.preventDefault());
uploadArea.addEventListener('drop',e=>{e.preventDefault();handleFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
function handleFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const reader=new FileReader();
  reader.onload=ev=>{const img=new Image();img.onload=()=>{uploadedImage=img;const pv=document.getElementById('img-preview');pv.src=ev.target.result;pv.style.display='block';};img.src=ev.target.result;};
  reader.readAsDataURL(file);
}
document.getElementById('btn-apply-img').addEventListener('click',applyImageEdge);
function applyImageEdge(){
  if(!uploadedImage) return;
  const oc=document.createElement('canvas');
  const scale=Math.min(canvas.width/uploadedImage.width,canvas.height/uploadedImage.height);
  oc.width=Math.floor(uploadedImage.width*scale); oc.height=Math.floor(uploadedImage.height*scale);
  const oc2=oc.getContext('2d'); oc2.drawImage(uploadedImage,0,0,oc.width,oc.height);
  const id=oc2.getImageData(0,0,oc.width,oc.height);
  const detail=p('sl-edetail')/100;
  const pts=sobelEdge(id,p('sl-ethresh'),p('sl-eblur'));
  const maxPts=Math.floor(3000*detail);
  strokes=edgePointsToStrokes(pts,(canvas.width-oc.width)/2,(canvas.height-oc.height)/2,p('sl-radius')*0.4,maxPts);
  scheduleRender();
}
function sobelEdge(imgData,thresh,blurRadius){
  const w=imgData.width,h=imgData.height,d=imgData.data;
  const gray=new Float32Array(w*h);
  for(let i=0;i<w*h;i++) gray[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];
  const bl=blurRadius>0?boxBlur(gray,w,h,Math.round(blurRadius)):gray,pts=[];
  for(let y=1;y<h-1;y++) for(let x=1;x<w-1;x++){
    const gx=-bl[(y-1)*w+(x-1)]-2*bl[y*w+(x-1)]-bl[(y+1)*w+(x-1)]+bl[(y-1)*w+(x+1)]+2*bl[y*w+(x+1)]+bl[(y+1)*w+(x+1)];
    const gy=-bl[(y-1)*w+(x-1)]-2*bl[(y-1)*w+x]-bl[(y-1)*w+(x+1)]+bl[(y+1)*w+(x-1)]+2*bl[(y+1)*w+x]+bl[(y+1)*w+(x+1)];
    if(Math.sqrt(gx*gx+gy*gy)>thresh) pts.push({x,y});
  }
  return pts;
}
function boxBlur(gray,w,h,r){
  const out=new Float32Array(w*h);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    let sum=0,cnt=0;
    for(let dy=-r;dy<=r;dy++) for(let dx=-r;dx<=r;dx++){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<w&&ny>=0&&ny<h){sum+=gray[ny*w+nx];cnt++;}}
    out[y*w+x]=sum/cnt;
  }
  return out;
}
function edgePointsToStrokes(pts,ox,oy,spacing,maxPts){
  if(!pts.length) return [];
  const step=Math.max(1,Math.floor(pts.length/maxPts));
  const sampled=pts.filter((_,i)=>i%step===0);
  const used=new Uint8Array(sampled.length),chains=[],sp2=spacing*spacing*9;
  for(let i=0;i<sampled.length;i++){
    if(used[i]) continue; used[i]=1;
    const chain=[{x:sampled[i].x+ox,y:sampled[i].y+oy}];let cur=i,found=true;
    while(found){
      found=false;let best=-1,bestD=sp2;
      for(let j=0;j<sampled.length;j++){
        if(used[j]) continue;
        const dx=sampled[j].x-sampled[cur].x,dy=sampled[j].y-sampled[cur].y,d2=dx*dx+dy*dy;
        if(d2<bestD){bestD=d2;best=j;}
      }
      if(best>=0){used[best]=1;chain.push({x:sampled[best].x+ox,y:sampled[best].y+oy});cur=best;found=true;}
    }
    if(chain.length>2) chains.push(chain);
  }
  return chains;
}

function snoise(x,y){
  const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
  const h=(a,b)=>((Math.sin(a*127.1+b*311.7)*43758.5453)%1+1)%1;
  const lerp=(a,b,t)=>a+t*(b-a),fade=t=>t*t*(3-2*t);
  return lerp(lerp(h(xi,yi),h(xi+1,yi),fade(xf)),lerp(h(xi,yi+1),h(xi+1,yi+1),fade(xf)),fade(yf))*2-1;
}
function resample(pts,spacing){
  if(pts.length<2) return pts;
  const out=[pts[0]];let carry=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x,dy=pts[i].y-pts[i-1].y,seg=Math.sqrt(dx*dx+dy*dy);
    let d=carry;
    while(d<seg){const t=d/seg;out.push({x:pts[i-1].x+dx*t,y:pts[i-1].y+dy*t});d+=spacing;}
    carry=d-seg;
  }
  return out;
}
function buildField(pts,r,cols,rows,step){
  const cutoff2=4*r*r,grid=new Float32Array(cols*rows);
  for(let i=0;i<pts.length;i++){
    const px=pts[i].x,py=pts[i].y;
    const c0=Math.max(0,Math.floor((px-2*r)/step)),c1=Math.min(cols-1,Math.ceil((px+2*r)/step));
    const r0=Math.max(0,Math.floor((py-2*r)/step)),r1=Math.min(rows-1,Math.ceil((py+2*r)/step));
    for(let row=r0;row<=r1;row++) for(let col=c0;col<=c1;col++){
      const dx=col*step-px,dy=row*step-py,d2=dx*dx+dy*dy;
      if(d2<cutoff2) grid[row*cols+col]+=(1-d2/cutoff2)**2;
    }
  }
  return grid;
}

// apply warp points: locally boost field (inflate) + add noise roughness
function applyWarpPoints(grid,cols,rows,step,wpts){
  if(!wpts.length) return;
  for(let row=0;row<rows;row++) for(let col=0;col<cols;col++){
    const wx=col*step,wy=row*step;
    for(const wp of wpts){
      const dx=wx-wp.x,dy=wy-wp.y,d2=dx*dx+dy*dy,r2=wp.r*wp.r;
      if(d2>=r2) continue;
      const t=1-d2/r2; // 0..1 falloff
      const falloff=t*t;
      // inflate: boost field value
      grid[row*cols+col]+=falloff*wp.strength*0.8;
      // roughness: add noise scaled by strength
      const nf=0.04+wp.strength*0.03;
      const noise=snoise(wx*nf,wy*nf)*0.5+snoise(wx*nf*2.1+7,wy*nf*2.1+13)*0.3;
      grid[row*cols+col]+=falloff*wp.strength*0.6*noise;
    }
  }
}

function warpedSample(grid,cols,rows,col,row,nd,nf){
  if(nd<=0){const c=Math.max(0,Math.min(cols-1,col)),r=Math.max(0,Math.min(rows-1,row));return grid[r*cols+c];}
  const wc=col+snoise(col*nf,row*nf)*nd,wr=row+snoise(col*nf+31.41,row*nf+27.18)*nd;
  const c0=Math.floor(wc),r0=Math.floor(wr),c1=Math.min(cols-1,c0+1),r1=Math.min(rows-1,r0+1);
  const fc=wc-c0,fr=wr-r0;
  const cc0=Math.max(0,Math.min(cols-1,c0)),cc1=Math.max(0,Math.min(cols-1,c1));
  const rr0=Math.max(0,Math.min(rows-1,r0)),rr1=Math.max(0,Math.min(rows-1,r1));
  return(grid[rr0*cols+cc0]*(1-fc)+grid[rr0*cols+cc1]*fc)*(1-fr)
        +(grid[rr1*cols+cc0]*(1-fc)+grid[rr1*cols+cc1]*fc)*fr;
}
function march(grid,cols,rows,step,thresh,nd,nf){
  const segs=[],sv=(c,r)=>warpedSample(grid,cols,rows,c,r,nd,nf);
  const interp=(ax,ay,bx,by,va,vb)=>{const t=(thresh-va)/(vb-va);return{x:ax+(bx-ax)*t,y:ay+(by-ay)*t};};
  for(let r=0;r<rows-1;r++) for(let c=0;c<cols-1;c++){
    const x=c*step,y=r*step,x1=x+step,y1=y+step;
    const v00=sv(c,r),v10=sv(c+1,r),v01=sv(c,r+1),v11=sv(c+1,r+1);
    const idx=(v00>thresh?8:0)|(v10>thresh?4:0)|(v11>thresh?2:0)|(v01>thresh?1:0);
    if(idx===0||idx===15) continue;
    const T=interp(x,y,x1,y,v00,v10),R=interp(x1,y,x1,y1,v10,v11);
    const B=interp(x,y1,x1,y1,v01,v11),L=interp(x,y,x,y1,v00,v01);
    if(idx===5||idx===10){
      const center=(v00+v10+v01+v11)*0.25;
      if(idx===5){if(center>thresh){segs.push([T,R],[B,L]);}else{segs.push([T,L],[R,B]);}}
      else{if(center>thresh){segs.push([T,L],[R,B]);}else{segs.push([T,R],[B,L]);}}
      continue;
    }
    const tbl={1:[[B,L]],2:[[R,B]],3:[[R,L]],4:[[T,R]],6:[[T,B]],7:[[T,L]],8:[[L,T]],9:[[T,B]],11:[[R,T]],12:[[R,L]],13:[[B,R]],14:[[L,B]]};
    (tbl[idx]||[]).forEach(([a,b])=>segs.push([a,b]));
  }
  return segs;
}
function chain(segs){
  if(!segs.length) return [];
  const EPS=1.0;
  function key(pt){return `${Math.round(pt.x/EPS)},${Math.round(pt.y/EPS)}`;}
  const adj=new Map();
  function addAdj(k,i){if(!adj.has(k))adj.set(k,[]);adj.get(k).push(i);}
  for(let i=0;i<segs.length;i++){addAdj(key(segs[i][0]),i);addAdj(key(segs[i][1]),i);}
  const used=new Uint8Array(segs.length),chains=[];
  for(let i=0;i<segs.length;i++){
    if(used[i]) continue; used[i]=1;
    const pts=[segs[i][0],segs[i][1]];
    for(let dir=0;dir<2;dir++){
      let changed=true;
      while(changed){
        changed=false;
        const tip=dir===0?pts[pts.length-1]:pts[0];
        const neighbors=adj.get(key(tip))||[];
        for(const j of neighbors){
          if(used[j]) continue; used[j]=1; changed=true;
          const[a,b]=segs[j];
          const useA=(key(tip)===key(a));
          if(dir===0) pts.push(useA?b:a); else pts.unshift(useA?b:a);
          break;
        }
      }
    }
    if(pts.length>2) chains.push(pts);
  }
  return chains;
}
function smoothPath(pts){
  if(pts.length<2) return;
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=0;i<pts.length-1;i++){
    const mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;
    if(i===0) ctx.lineTo(mx,my); else ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
  }
  ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
}
function hexToRgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}

function getChains(live){
  const all=live&&currentStroke?[...strokes,currentStroke]:strokes;
  if(!all.length&&!warpPoints.length) return null;
  if(!all.length) return null;
  const radius=p('sl-radius'),smoothness=p('sl-smooth')/100,loose=p('sl-loose')/100,noiseAmt=p('sl-noise')/100;
  const step=Math.max(3,Math.floor(radius/7));
  const cols=Math.ceil(canvas.width/step)+2,rows=Math.ceil(canvas.height/step)+2;
  const allPts=[];
  all.forEach(s=>resample(s,Math.max(2,radius*0.35)).forEach(pt=>allPts.push(pt)));
  if(!allPts.length) return null;
  const grid=buildField(allPts,radius,cols,rows,step);
  // apply warp points to field
  if(warpPoints.length) applyWarpPoints(grid,cols,rows,step,warpPoints);
  let maxVal=0;
  for(let i=0;i<grid.length;i++) if(grid[i]>maxVal) maxVal=grid[i];
  if(maxVal<0.01) return null;
  const thresh=maxVal*(0.18+loose*0.37)*(0.5+(1-smoothness)*0.5);
  const segs=march(grid,cols,rows,step,thresh,noiseAmt*4.5,0.18+noiseAmt*0.25);
  return chain(segs);
}
function scheduleRender(live){
  if(rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(()=>{rafId=null;render(live);});
}
function render(live){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const chains=getChains(live);
  if(!chains||!chains.length) return;
  const fo=p('sl-opacity')/100,strokeOn=document.getElementById('ck-stroke').checked;
  const sw=p('sl-swidth'),so=p('sl-sopacity')/100;
  const{r,g,b}=hexToRgb(fillColor),{r:sr,g:sg,b:sb}=hexToRgb(strokeColor);
  ctx.save();
  ctx.beginPath();
  chains.forEach(c=>{smoothPath(c);ctx.closePath();});
  if(fo>0){ctx.fillStyle=`rgba(${r},${g},${b},${fo})`;ctx.fill('evenodd');}
  if(strokeOn){ctx.strokeStyle=`rgba(${sr},${sg},${sb},${so})`;ctx.lineWidth=sw;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();}
  ctx.restore();
  // draw warp point indicators in warp mode
  if(currentTool==='warp'){
    ctx.save();
    warpPoints.forEach(wp=>{
      ctx.beginPath();ctx.arc(wp.x,wp.y,wp.r,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,100,50,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();
      ctx.beginPath();ctx.arc(wp.x,wp.y,4,0,Math.PI*2);
      ctx.fillStyle='rgba(255,100,50,0.8)';ctx.fill();ctx.setLineDash([]);
    });
    ctx.restore();
  }
}
function exportSVG(){
  const chains=getChains(false);if(!chains||!chains.length) return;
  const fo=p('sl-opacity')/100,strokeOn=document.getElementById('ck-stroke').checked;
  const sw=p('sl-swidth'),so=p('sl-sopacity')/100;
  function pathD(pts){
    if(pts.length<2) return '';
    let d=`M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const mx=((pts[i].x+pts[i+1].x)/2).toFixed(1),my=((pts[i].y+pts[i+1].y)/2).toFixed(1);
      if(i===0) d+=` L${mx},${my}`; else d+=` Q${pts[i].x.toFixed(1)},${pts[i].y.toFixed(1)} ${mx},${my}`;
    }
    return d+` L${pts[pts.length-1].x.toFixed(1)},${pts[pts.length-1].y.toFixed(1)} Z`;
  }
  const d=chains.map(c=>pathD(c)).join(' ');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}">
<rect width="100%" height="100%" fill="#f5f5f0"/>
<path d="${d}" fill="${fo>0?fillColor:'none'}" fill-opacity="${fo}" fill-rule="evenodd"
  stroke="${strokeOn?strokeColor:'none'}" stroke-width="${strokeOn?sw:0}"
  stroke-opacity="${so}" stroke-linejoin="round" stroke-linecap="round"/>
</svg>`;
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const a=document.createElement('a');a.download='blobit.svg';a.href=URL.createObjectURL(blob);a.click();
}
</script>
